{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-semibold text-gray-800">✅ 进场核销</h2>
    <div class="flex gap-2">
        <button onclick="openCheckinModal()"
                class="px-4 py-2 rounded-lg text-sm bg-green-600 text-white hover:bg-green-700">➕ 新增进场</button>
        <button onclick="openCheckinModal(); switchCheckinMode('manual');" id="modeManualBtn"
                class="px-3 py-2 rounded-lg text-sm bg-blue-600 text-white">🔍 手动搜索</button>
        <button onclick="openScanCheckinModal()" id="modeScanBtn"
                class="px-3 py-2 rounded-lg text-sm bg-gray-200 text-gray-600 hover:bg-gray-300">📱 扫码/刷卡</button>
    </div>
</div>

<!-- 日期筛选 -->
<div class="mb-4">
    <input type="date" id="dateFilter"
           class="px-3 py-2 border rounded-lg text-sm"
           hx-get="/api/checkins/table" hx-trigger="change"
           hx-target="#checkinTable" hx-params="checkin_date">
</div>

<!-- 进场记录表格 -->
<div id="checkinTable" hx-get="/api/checkins/table" hx-trigger="load">
    <div class="text-center py-8 text-gray-400">加载中...</div>
</div>

<!-- ════════════════════════════════════════ -->
<!-- 新增进场对话框 -->
<!-- ════════════════════════════════════════ -->
<div id="checkinModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">新增进场</h3>
            <button onclick="closeCheckinModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>

        <form id="checkinForm" onsubmit="submitCheckin(event)">
            <div class="space-y-4">

                <!-- ─── 手动搜索模式 ─── -->
                <div id="manualSearchSection">
                    <label class="block text-sm text-gray-600 mb-1">会员 <span class="text-red-500">*</span></label>
                    <div class="flex gap-2">
                        <input id="memberSearchInput" type="text"
                               class="flex-1 px-3 py-2 border rounded-lg text-sm"
                               placeholder="输入会员编号 / 姓名 / 手机号搜索..."
                               autocomplete="off"
                               oninput="searchMember(this.value)">
                        <button type="button" onclick="clearMember()"
                                class="px-3 py-2 text-gray-400 hover:text-gray-600 border rounded-lg text-sm">✕</button>
                    </div>
                    <div id="memberSearchResults" class="hidden mt-1 bg-white border rounded-lg shadow-lg max-h-48 overflow-y-auto"></div>
                </div>

                <!-- ─── 扫码/刷卡模式 ─── -->
                <div id="scanSection" class="hidden">
                    <label class="block text-sm text-gray-600 mb-1">扫码/刷卡</label>
                    <div class="flex gap-2">
                        <input id="scanInput" type="text"
                               class="flex-1 px-3 py-2 border rounded-lg text-sm"
                               placeholder="扫码枪 / 输入手机号 / 会员编号..."
                               autocomplete="off"
                               onkeydown="if(event.key==='Enter'){scanMember()}">
                        <button type="button" onclick="scanMember()"
                                class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700">查询</button>
                    </div>
                    <div id="scanResult" class="hidden mt-2"></div>
                </div>

                <!-- ─── 已选会员信息 ─── -->
                <div id="selectedMemberInfo" class="hidden bg-blue-50 border border-blue-200 rounded-lg p-3">
                    <div class="flex justify-between items-start">
                        <div>
                            <span id="selectedMemberName" class="font-medium text-sm"></span>
                            <span id="selectedMemberId" class="text-xs text-gray-500 ml-2"></span>
                        </div>
                        <span id="selectedMemberStatus" class="px-2 py-0.5 rounded text-xs font-medium"></span>
                    </div>
                    <div class="grid grid-cols-3 gap-2 mt-2 text-xs text-gray-600">
                        <div>📱 <span id="selectedMemberPhone"></span></div>
                        <div>📊 等级: <span id="selectedMemberLevel"></span></div>
                        <div>🎫 会籍: <span id="selectedMemberCard"></span></div>
                    </div>
                    <input id="selectedMemberIdInput" name="member_id" type="hidden">
                    <input id="selectedMemberNameInput" name="member_name" type="hidden">
                    <input id="checkinType" name="checkin_type" type="hidden" value="核销">
                    <input id="cardType" name="card_type" type="hidden" value="">
                </div>

                <!-- ─── 会籍卡联动 + 核销方式 ─── -->
                <div id="cardSection" class="hidden">
                    <!-- 选择会籍卡 -->
                    <div class="mb-3">
                        <label class="block text-sm text-gray-600 mb-1">核销会籍卡</label>
                        <select id="cardSelect" name="card_id" onchange="onCardSelect(this)"
                                class="w-full px-3 py-2 border rounded-lg text-sm">
                            <option value="">—— 不核销会籍卡 ——</option>
                        </select>
                    </div>

                    <!-- 核销方式（根据所选卡类型动态显示） -->
                    <div id="consumeSection" class="hidden bg-gray-50 border border-gray-200 rounded-lg p-3">
                        <div class="text-xs text-gray-500 mb-2">💳 核销方式</div>
                        <div id="consumeOptions" class="space-y-2">
                            <!-- 由 JS 动态填充 -->
                        </div>
                        <input id="consumeTypeInput" name="consume_type" type="hidden" value="">
                        <input id="consumeDetailInput" name="consume_detail" type="hidden" value="">
                    </div>
                </div>

                <!-- ─── 扣减预览 ─── -->
                <div id="deductPreview" class="hidden bg-gray-50 border border-gray-200 rounded-lg p-3">
                    <div class="text-xs text-gray-500 mb-2">📋 扣减预览</div>
                    <div class="space-y-1 text-sm">
                        <div class="flex justify-between">
                            <span class="text-gray-600">剩余次数</span>
                            <span id="previewLessons" class="text-gray-800">-</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">储值余额</span>
                            <span id="previewBalance" class="text-gray-800">-</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">现金卡额度</span>
                            <span id="previewCashCard" class="text-green-700 font-medium">-</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">会籍有效期</span>
                            <span id="previewValidity" class="text-gray-800">-</span>
                        </div>
                        <div class="flex justify-between border-t border-gray-200 pt-1 mt-1">
                            <span class="text-gray-600 font-medium">本次扣减</span>
                            <span id="previewDeduct" class="text-blue-600 font-medium">-</span>
                        </div>
                    </div>
                </div>

                <!-- ─── 跟进员工 ─── -->
                <div>
                    <label class="block text-sm text-gray-600 mb-1">跟进教练</label>
                    <select id="staffFollowup" name="staff_followup"
                            class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="">—— 不指定 ——</option>
                    </select>
                </div>

                <!-- ─── 操作人 ─── -->
                <div>
                    <label class="block text-sm text-gray-600 mb-1">操作人</label>
                    <input name="operator" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="操作员姓名">
                </div>
            </div>

            <div class="flex justify-end gap-2 mt-6">
                <button type="button" onclick="closeCheckinModal()"
                        class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                <button type="submit" id="submitBtn"
                        class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700 disabled:bg-gray-400" disabled>确认进场</button>
            </div>
        </form>
    </div>
</div>

{% block page_js %}
<script src="/static/js/checkin.js"></script>
{% endblock %}
{% endblock %}
