{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-semibold text-gray-800">售课记录</h2>
    <button onclick="openAddModal()"
            class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">
        + 新增售课
    </button>
</div>

<div id="saleTable" hx-get="/api/sales/table" hx-trigger="load">
    <div class="text-center py-8 text-gray-400">加载中...</div>
</div>

<!-- 新增售课对话框 -->
<div id="addModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">新增售课</h3>
            <button onclick="closeAddModal()"
                    class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <form id="saleForm">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <!-- 会员：搜索输入框 + 下拉列表 -->
                <div class="relative">
                    <label class="block text-sm text-gray-600 mb-1">选择会员</label>
                    <input id="searchMember" type="text" placeholder="输入姓名/编号/电话搜索..."
                           class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-transparent"
                           oninput="filterMembers()" onfocus="showMemberDropdown()" onblur="hideMemberDropdown()">
                    <div id="memberDropdown" class="absolute z-10 top-full left-0 right-0 mt-1 bg-white border rounded-lg shadow-lg max-h-48 overflow-y-auto hidden">
                    </div>
                </div>
                <div class="flex items-end gap-2">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">会员信息</label>
                        <div id="memberInfo" class="px-3 py-2 border rounded-lg text-sm bg-gray-50 text-gray-400 min-h-[38px] flex items-center">未选择</div>
                    </div>
                    <button type="button" onclick="clearMember()"
                            class="px-2 py-2 text-xs text-gray-400 border rounded-lg hover:bg-gray-50 mb-0">✕</button>
                </div>
                <input id="fldMemberId" name="member_id" type="hidden">
                <input id="fldMemberName" name="member_name" type="hidden">
                <input id="fldMemberPhone" name="member_phone" type="hidden">

                <!-- 课程：搜索输入框 + 下拉列表 -->
                <div class="relative">
                    <label class="block text-sm text-gray-600 mb-1">选择课程</label>
                    <input id="searchCourse" type="text" placeholder="输入名称/编号搜索..."
                           class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-transparent"
                           oninput="filterCourses()" onfocus="showCourseDropdown()" onblur="hideCourseDropdown()">
                    <div id="courseDropdown" class="absolute z-10 top-full left-0 right-0 mt-1 bg-white border rounded-lg shadow-lg max-h-48 overflow-y-auto hidden">
                    </div>
                </div>
                <div class="flex items-end gap-2">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">课程信息</label>
                        <div id="courseInfo" class="px-3 py-2 border rounded-lg text-sm bg-gray-50 text-gray-400 min-h-[38px] flex items-center">未选择</div>
                    </div>
                    <button type="button" onclick="clearCourse()"
                            class="px-2 py-2 text-xs text-gray-400 border rounded-lg hover:bg-gray-50 mb-0">✕</button>
                </div>
                <input id="fldCourseId" name="course_id" type="hidden">
                <input id="fldCourseName" name="course_name" type="hidden">
                <input id="fldUnitPrice" name="unit_price" type="hidden">

                <!-- 数值 -->
                <div><label class="block text-sm text-gray-600 mb-1">购买课时</label><input name="bought_hours" type="number" value="1" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">赠送课时</label><input name="bonus_hours" type="number" value="0" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">实收金额 *</label><input name="actual_amount" type="number" step="0.01" value="0" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">支付方式</label>
                    <select name="payment_method" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="">请选择</option><option value="现金">现金</option><option value="微信">微信</option><option value="支付宝">支付宝</option><option value="刷卡">刷卡</option><option value="转账">转账</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">支付状态</label>
                    <select name="payment_status" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="已付清">已付清</option><option value="部分支付">部分支付</option><option value="未付款">未付款</option>
                    </select>
                </div>
                <div><label class="block text-sm text-gray-600 mb-1">开卡日期</label><input id="fldStartDate" name="start_date" type="date" class="w-full px-3 py-2 border rounded-lg text-sm" onchange="autoCalcEndDate()"></div>
                <div><label class="block text-sm text-gray-600 mb-1">到期日期</label><input id="fldEndDate" name="end_date" type="date" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <!-- 销售人员：搜索输入框 + 下拉列表 -->
                <div class="relative">
                    <label class="block text-sm text-gray-600 mb-1">选择销售人员</label>
                    <input id="searchStaff" type="text" placeholder="输入姓名/编号搜索..."
                           class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-transparent"
                           oninput="filterStaff()" onfocus="showStaffDropdown()" onblur="hideStaffDropdown()">
                    <div id="staffDropdown" class="absolute z-10 top-full left-0 right-0 mt-1 bg-white border rounded-lg shadow-lg max-h-48 overflow-y-auto hidden">
                    </div>
                </div>
                <div class="flex items-end gap-2">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">员工信息</label>
                        <div id="staffInfo" class="px-3 py-2 border rounded-lg text-sm bg-gray-50 text-gray-400 min-h-[38px] flex items-center">未选择</div>
                    </div>
                    <button type="button" onclick="clearStaff()"
                            class="px-2 py-2 text-xs text-gray-400 border rounded-lg hover:bg-gray-50 mb-0">✕</button>
                </div>
                <input id="fldStaffId" name="staff_id" type="hidden">
                <input id="fldStaffName" name="staff_name" type="hidden">
            </div>
            <div id="formError" class="text-red-500 text-sm mt-3 hidden"></div>
            <div class="flex justify-end gap-2 mt-4">
                <button type="button" onclick="closeAddModal()"
                        class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                <button type="button" onclick="submitSale()"
                        class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 编辑售课对话框 -->
<div id="editModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">编辑售课</h3>
            <button onclick="closeEditModal()"
                    class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <form id="editSaleForm">
            <input type="hidden" id="editSaleId">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <!-- 会员 -->
                <div class="relative">
                    <label class="block text-sm text-gray-600 mb-1">选择会员</label>
                    <input id="editSearchMember" type="text" placeholder="输入姓名/编号/电话搜索..."
                           class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-transparent"
                           oninput="filterEditMembers()" onfocus="showEditMemberDropdown()" onblur="hideEditMemberDropdown()">
                    <div id="editMemberDropdown" class="absolute z-10 top-full left-0 right-0 mt-1 bg-white border rounded-lg shadow-lg max-h-48 overflow-y-auto hidden">
                    </div>
                </div>
                <div class="flex items-end gap-2">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">会员信息</label>
                        <div id="editMemberInfo" class="px-3 py-2 border rounded-lg text-sm bg-gray-50 text-gray-400 min-h-[38px] flex items-center">未选择</div>
                    </div>
                    <button type="button" onclick="clearEditMember()"
                            class="px-2 py-2 text-xs text-gray-400 border rounded-lg hover:bg-gray-50 mb-0">✕</button>
                </div>
                <input id="editFldMemberId" name="member_id" type="hidden">
                <input id="editFldMemberName" name="member_name" type="hidden">
                <input id="editFldMemberPhone" name="member_phone" type="hidden">

                <!-- 课程 -->
                <div class="relative">
                    <label class="block text-sm text-gray-600 mb-1">选择课程</label>
                    <input id="editSearchCourse" type="text" placeholder="输入名称/编号搜索..."
                           class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-transparent"
                           oninput="filterEditCourses()" onfocus="showEditCourseDropdown()" onblur="hideEditCourseDropdown()">
                    <div id="editCourseDropdown" class="absolute z-10 top-full left-0 right-0 mt-1 bg-white border rounded-lg shadow-lg max-h-48 overflow-y-auto hidden">
                    </div>
                </div>
                <div class="flex items-end gap-2">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">课程信息</label>
                        <div id="editCourseInfo" class="px-3 py-2 border rounded-lg text-sm bg-gray-50 text-gray-400 min-h-[38px] flex items-center">未选择</div>
                    </div>
                    <button type="button" onclick="clearEditCourse()"
                            class="px-2 py-2 text-xs text-gray-400 border rounded-lg hover:bg-gray-50 mb-0">✕</button>
                </div>
                <input id="editFldCourseId" name="course_id" type="hidden">
                <input id="editFldCourseName" name="course_name" type="hidden">
                <input id="editFldUnitPrice" name="unit_price" type="hidden">

                <!-- 数值 -->
                <div><label class="block text-sm text-gray-600 mb-1">购买课时</label><input id="editBoughtHours" name="bought_hours" type="number" value="1" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">赠送课时</label><input id="editBonusHours" name="bonus_hours" type="number" value="0" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">实收金额 *</label><input id="editActualAmount" name="actual_amount" type="number" step="0.01" value="0" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">支付方式</label>
                    <select id="editPaymentMethod" name="payment_method" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="">请选择</option><option value="现金">现金</option><option value="微信">微信</option><option value="支付宝">支付宝</option><option value="刷卡">刷卡</option><option value="转账">转账</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">支付状态</label>
                    <select id="editPaymentStatus" name="payment_status" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="已付清">已付清</option><option value="部分支付">部分支付</option><option value="未付款">未付款</option>
                    </select>
                </div>
                <div><label class="block text-sm text-gray-600 mb-1">开卡日期</label><input id="editFldStartDate" name="start_date" type="date" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">到期日期</label><input id="editFldEndDate" name="end_date" type="date" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <!-- 销售人员 -->
                <div class="relative">
                    <label class="block text-sm text-gray-600 mb-1">选择销售人员</label>
                    <input id="editSearchStaff" type="text" placeholder="输入姓名/编号搜索..."
                           class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-transparent"
                           oninput="filterEditStaff()" onfocus="showEditStaffDropdown()" onblur="hideEditStaffDropdown()">
                    <div id="editStaffDropdown" class="absolute z-10 top-full left-0 right-0 mt-1 bg-white border rounded-lg shadow-lg max-h-48 overflow-y-auto hidden">
                    </div>
                </div>
                <div class="flex items-end gap-2">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">员工信息</label>
                        <div id="editStaffInfo" class="px-3 py-2 border rounded-lg text-sm bg-gray-50 text-gray-400 min-h-[38px] flex items-center">未选择</div>
                    </div>
                    <button type="button" onclick="clearEditStaff()"
                            class="px-2 py-2 text-xs text-gray-400 border rounded-lg hover:bg-gray-50 mb-0">✕</button>
                </div>
                <input id="editFldStaffId" name="staff_id" type="hidden">
                <input id="editFldStaffName" name="staff_name" type="hidden">
            </div>
            <div id="editFormError" class="text-red-500 text-sm mt-3 hidden"></div>
            <div class="flex justify-end gap-2 mt-4">
                <button type="button" onclick="closeEditModal()"
                        class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                <button type="button" onclick="submitEditSale()"
                        class="px-4 py-2 text-sm text-white bg-green-600 rounded-lg hover:bg-green-700">保存修改</button>
            </div>
        </form>
    </div>
</div>

{% block page_js %}
<script src="/static/js/sales.js"></script>
{% endblock %}
{% endblock %}
