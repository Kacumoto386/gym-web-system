{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-semibold text-gray-800">📋 预约管理</h2>
</div>

<!-- 筛选条件 -->
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-4">
    <div class="flex flex-wrap items-center gap-3">
        <div class="flex items-center gap-2">
            <label class="text-sm text-gray-600">日期：</label>
            <input type="date" id="filterDateFrom" value="{{ today }}"
                   class="px-3 py-1.5 border rounded-lg text-sm w-36"
                   onchange="refreshTable()">
            <span class="text-gray-400 text-sm">至</span>
            <input type="date" id="filterDateTo" value="{{ today }}"
                   class="px-3 py-1.5 border rounded-lg text-sm w-36"
                   onchange="refreshTable()">
        </div>
        <div class="flex items-center gap-2">
            <label class="text-sm text-gray-600">状态：</label>
            <select id="filterStatus" class="px-3 py-1.5 border rounded-lg text-sm w-28" onchange="refreshTable()">
                <option value="">全部</option>
                <option value="已预约">🟢 已预约</option>
                <option value="已签到">🟡 已签到</option>
                <option value="已完成">🔵 已完成</option>
                <option value="已取消">⛔ 已取消</option>
            </select>
        </div>
        <button onclick="todayFilter()" class="px-3 py-1.5 border rounded-lg text-sm hover:bg-gray-50">今天</button>
        <button onclick="openAddBooking()"
                class="px-4 py-1.5 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition-colors ml-auto">
            ➕ 新增预约
        </button>
    </div>
</div>

<!-- 预约表格 -->
<div id="bookingTable" hx-get="/api/booking/table?date_from={{ today }}&date_to={{ today }}" hx-trigger="load">
    <div class="text-center py-8 text-gray-400">加载中...</div>
</div>

<!-- 新增预约对话框 -->
<div id="addBookingModal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden"
     onclick="if(event.target===this)closeAddBooking()">
    <div class="bg-white rounded-2xl shadow-xl w-[520px] max-h-[90vh] overflow-y-auto"
         onclick="event.stopPropagation()">
        <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
            <h3 class="text-base font-semibold text-gray-800">新增预约</h3>
            <button onclick="closeAddBooking()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
        </div>
        <div class="px-6 py-4 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">预约日期 *</label>
                    <input type="date" id="addDate" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">会员 *</label>
                    <select id="addMember" class="w-full px-3 py-2 border rounded-lg text-sm" onchange="onMemberChange()">
                        <option value="">-- 选择会员 --</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">开始时间</label>
                    <input type="time" id="addStartTime" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">结束时间</label>
                    <input type="time" id="addEndTime" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">课程 *</label>
                    <select id="addCourse" class="w-full px-3 py-2 border rounded-lg text-sm" onchange="onCourseChange()">
                        <option value="">-- 选择课程 --</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">教练</label>
                    <select id="addCoach" class="w-full px-3 py-2 border rounded-lg text-sm" onchange="onCoachChange()">
                        <option value="">-- 选择教练 --</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="block text-xs text-gray-500 mb-1">上课地点</label>
                    <input type="text" id="addLocation" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="如：私教室 / 团课区">
                </div>
            </div>
            <div id="addBookingError" class="text-red-500 text-xs hidden"></div>
        </div>
        <div class="px-6 py-3 border-t border-gray-100 flex justify-end gap-2">
            <button onclick="closeAddBooking()" class="px-4 py-2 border rounded-lg text-sm text-gray-600 hover:bg-gray-50">取消</button>
            <button onclick="submitBooking()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition-colors">保存</button>
        </div>
    </div>
</div>

<script>
let membersCache = [];
let coursesCache = [];
let coachesCache = [];

// ===== 初始化 =====

function init() {
    loadMembers();
    loadCourses();
    loadCoaches();
}

function loadMembers() {
    fetch('/api/members/search-json?q=')
        .then(r => r.json())
        .then(data => {
            membersCache = data || [];
            const sel = document.getElementById('addMember');
            sel.innerHTML = '<option value="">-- 选择会员 --</option>' +
                membersCache.map(m => `<option value="${m.member_id}" data-name="${m.name || ''}" data-phone="${m.phone || ''}">${m.name || ''} (${m.phone || ''})</option>`).join('');
        });
}

function loadCourses() {
    fetch('/api/booking/courses')
        .then(r => r.json())
        .then(data => {
            coursesCache = data || [];
            const sel = document.getElementById('addCourse');
            sel.innerHTML = '<option value="">-- 选择课程 --</option>' +
                coursesCache.map(c => `<option value="${c.course_id}" data-name="${c.name || ''}">${c.name}</option>`).join('');
        });
}

function loadCoaches() {
    fetch('/api/booking/coaches')
        .then(r => r.json())
        .then(data => {
            coachesCache = data || [];
            const sel = document.getElementById('addCoach');
            sel.innerHTML = '<option value="">-- 选择教练 --</option>' +
                coachesCache.map(c => `<option value="${c.staff_id}" data-name="${c.name || ''}">${c.name}${c.position ? ' ('+c.position+')' : ''}</option>`).join('');
        });
}

function onMemberChange() {}
function onCourseChange() {}
function onCoachChange() {}

// ===== 筛选 =====

function refreshTable() {
    const dateFrom = document.getElementById('filterDateFrom').value;
    const dateTo = document.getElementById('filterDateTo').value;
    const status = document.getElementById('filterStatus').value;
    const params = new URLSearchParams();
    if (dateFrom) params.set('date_from', dateFrom);
    if (dateTo) params.set('date_to', dateTo);
    if (status) params.set('status', status);

    const el = document.getElementById('bookingTable');
    el.innerHTML = '<div class="text-center py-8 text-gray-400">加载中...</div>';
    htmx.ajax('GET', `/api/booking/table?${params.toString()}`, {target: '#bookingTable'});
}

function todayFilter() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('filterDateFrom').value = today;
    document.getElementById('filterDateTo').value = today;
    refreshTable();
}

// ===== 新增预约对话框 =====

function openAddBooking() {
    document.getElementById('addBookingModal').classList.remove('hidden');
    document.getElementById('addDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('addBookingError').classList.add('hidden');
    // 重新加载数据确保最新
    loadMembers();
    loadCourses();
    loadCoaches();
}

function closeAddBooking() {
    document.getElementById('addBookingModal').classList.add('hidden');
}

function submitBooking() {
    const date = document.getElementById('addDate').value;
    const memberSel = document.getElementById('addMember');
    const memberId = memberSel.value;
    const memberName = memberSel.options[memberSel.selectedIndex]?.dataset?.name || '';
    const memberPhone = memberSel.options[memberSel.selectedIndex]?.dataset?.phone || '';
    const startTime = document.getElementById('addStartTime').value;
    const endTime = document.getElementById('addEndTime').value;
    const courseSel = document.getElementById('addCourse');
    const courseId = courseSel.value;
    const courseName = courseSel.options[courseSel.selectedIndex]?.dataset?.name || '';
    const coachSel = document.getElementById('addCoach');
    const coachId = coachSel.value;
    const coachName = coachSel.options[coachSel.selectedIndex]?.dataset?.name || '';
    const location = document.getElementById('addLocation').value;

    // 验证
    if (!date || !memberId || !courseId) {
        showError('请填写必填项（日期、会员、课程）');
        return;
    }

    const formData = new URLSearchParams();
    formData.set('booking_date', date);
    formData.set('member_id', memberId);
    formData.set('member_name', memberName);
    formData.set('member_phone', memberPhone);
    formData.set('start_time', startTime);
    formData.set('end_time', endTime);
    formData.set('course_id', courseId);
    formData.set('course_name', courseName);
    formData.set('coach_id', coachId);
    formData.set('coach_name', coachName);
    formData.set('location', location);

    fetch('/api/booking/create', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: formData.toString()
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            closeAddBooking();
            refreshTable();
        } else {
            showError(data.detail || data.message || '保存失败');
        }
    })
    .catch(e => showError('请求失败: ' + e));
}

function showError(msg) {
    const el = document.getElementById('addBookingError');
    el.textContent = msg;
    el.classList.remove('hidden');
}

// ===== 操作按钮（由表格片段触发）=====

function bookingCheckin(bookingId) {
    if (!confirm('确认该会员已到场签到？')) return;
    fetch(`/api/booking/${bookingId}/checkin`, {method: 'POST'})
        .then(r => r.json())
        .then(data => {
            if (data.status === 'ok') {
                refreshTable();
            } else {
                alert('签到失败: ' + (data.detail || '未知错误'));
            }
        })
        .catch(e => alert('请求失败: ' + e));
}

function cancelBooking(bookingId) {
    if (!confirm('确认取消该预约？')) return;
    fetch(`/api/booking/${bookingId}/cancel`, {method: 'POST'})
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                refreshTable();
            } else {
                alert('取消失败: ' + (data.detail || '未知错误'));
            }
        })
        .catch(e => alert('请求失败: ' + e));
}

function completeBooking(bookingId) {
    if (!confirm('确认标记为已完成？')) return;
    fetch(`/api/booking/${bookingId}/complete`, {method: 'POST'})
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                refreshTable();
            } else {
                alert('操作失败: ' + (data.detail || '未知错误'));
            }
        })
        .catch(e => alert('请求失败: ' + e));
}

// 首页快速签到用
function homeCheckinBooking(bookingId) {
    fetch(`/api/booking/${bookingId}/checkin`, {method: 'POST'})
        .then(r => r.json())
        .then(data => {
            if (data.status === 'ok') {
                htmx.trigger('#todayBookings', 'load');
            } else {
                alert('签到失败: ' + (data.detail || '未知错误'));
            }
        })
        .catch(e => alert('请求失败: ' + e));
}

// 初始化
document.addEventListener('DOMContentLoaded', init);
</script>
{% endblock %}
