{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-semibold text-gray-800">🛒 商品零售</h2>
    <button onclick="document.getElementById('addProductModal').classList.remove('hidden')"
            class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">+ 新增商品</button>
</div>

<!-- Tab 切换 5 tabs -->
<div class="flex gap-1 mb-4">
    <button id="tabCart" onclick="switchTab('cart')" class="px-4 py-2 text-sm rounded-lg bg-blue-600 text-white">购物车结账</button>
    <button id="tabProducts" onclick="switchTab('products')" class="px-4 py-2 text-sm rounded-lg bg-gray-200 text-gray-600 hover:bg-gray-300">商品管理</button>
    <button id="tabSales" onclick="switchTab('sales')" class="px-4 py-2 text-sm rounded-lg bg-gray-200 text-gray-600 hover:bg-gray-300">零售记录</button>
    <button id="tabInbounds" onclick="switchTab('inbounds')" class="px-4 py-2 text-sm rounded-lg bg-gray-200 text-gray-600 hover:bg-gray-300">进货入库</button>
    <button id="tabAnalysis" onclick="switchTab('analysis')" class="px-4 py-2 text-sm rounded-lg bg-gray-200 text-gray-600 hover:bg-gray-300">库存分析</button>
</div>

<!-- ──────── 购物车结账 ──────── -->
<div id="cartSection">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <!-- 左侧：商品列表 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100">
            <div class="px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                <span class="text-sm font-medium text-gray-700">📦 商品选择</span>
                <input id="productSearch" type="text" placeholder="搜索商品..."
                    class="w-40 px-2 py-1 text-xs border rounded-lg focus:outline-none focus:ring-1 focus:ring-blue-400"
                    oninput="filterProducts()">
            </div>
            <div id="productList" class="divide-y divide-gray-50 max-h-96 overflow-y-auto p-2">
                <div class="text-center py-8 text-gray-400 text-sm">加载中...</div>
            </div>
        </div>

        <!-- 中间：购物车清单 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100">
            <div class="px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                <span class="text-sm font-medium text-gray-700">🛒 购物车</span>
                <span id="cartCount" class="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">0 件</span>
            </div>
            <div id="cartItems" class="max-h-96 overflow-y-auto p-2">
                <div class="text-center py-8 text-gray-400 text-sm">购物车为空</div>
            </div>
        </div>

        <!-- 右侧：结算区 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100">
            <div class="px-4 py-3 border-b border-gray-100">
                <span class="text-sm font-medium text-gray-700">💳 结算</span>
            </div>
            <div class="p-4 space-y-3">
                <!-- 选择会员 -->
                <div>
                    <label class="block text-xs text-gray-500 mb-1">会员（可选）</label>
                    <div class="flex gap-2">
                        <input id="checkoutMemberId" type="text" placeholder="编号"
                            class="flex-1 px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-400"
                            oninput="lookupMember()">
                        <input id="checkoutMemberName" type="text" placeholder="姓名" readonly
                            class="flex-1 px-3 py-2 border rounded-lg text-sm bg-gray-50">
                    </div>
                    <div id="balanceInfo" class="hidden mt-1 text-xs text-green-600"></div>
                </div>

                <!-- 小计 -->
                <div class="border-t pt-3">
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500">商品小计</span>
                        <span id="cartSubtotal" class="font-semibold text-gray-800">¥0.00</span>
                    </div>
                </div>

                <!-- 使用储值 -->
                <div class="flex items-center gap-2">
                    <input id="useBalance" type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <label for="useBalance" class="text-sm text-gray-600">使用会员储值</label>
                </div>

                <!-- 支付方式 -->
                <div>
                    <label class="block text-xs text-gray-500 mb-1">支付方式</label>
                    <select id="paymentMethod" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                        <option value="现金">现金</option>
                        <option value="微信">微信</option>
                        <option value="支付宝">支付宝</option>
                        <option value="银行卡">银行卡</option>
                    </select>
                </div>

                <!-- 操作员 -->
                <div>
                    <label class="block text-xs text-gray-500 mb-1">操作员</label>
                    <input id="checkoutOperator" type="text" placeholder="经办人"
                        class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                </div>

                <!-- 结账按钮 -->
                <button id="checkoutBtn" onclick="submitCart()"
                    class="w-full bg-green-600 text-white py-2.5 rounded-lg hover:bg-green-700 text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    🛒 确认结账
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ──────── 商品管理 ──────── -->
<div id="productsSection" class="hidden">
    <div id="productTable" hx-get="/api/products/table" hx-trigger="load"><div class="text-center py-8 text-gray-400">加载中...</div></div>
</div>

<!-- ──────── 零售记录 ──────── -->
<div id="salesSection" class="hidden">
    <div id="productSaleTable" hx-get="/api/product-sales/table" hx-trigger="load"><div class="text-center py-8 text-gray-400">加载中...</div></div>
</div>

<!-- ──────── 进货入库 ──────── -->
<div id="inboundsSection" class="hidden">
    <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-medium text-gray-700">📦 进货入库</h3>
        <button onclick="openAddInbound()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">+ 新增入库</button>
    </div>
    <div id="inboundTable" hx-get="/api/products/inbounds/table" hx-trigger="load"><div class="text-center py-8 text-gray-400">加载中...</div></div>
</div>

<!-- ──────── 库存分析 ──────── -->
<div id="analysisSection" class="hidden">
    <div id="lowStockSection" hx-get="/api/products/low-stock" hx-trigger="load"><div class="text-center py-8 text-gray-400">加载中...</div></div>
    <div class="mt-4" id="profitSection" hx-get="/api/products/profit-summary" hx-trigger="load"><div class="text-center py-8 text-gray-400">加载中...</div></div>
</div>

<!-- ──────── 新增商品弹窗 ──────── -->
<div id="addProductModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">新增商品</h3>
            <button onclick="closeAddProduct()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <form id="addProductForm" onsubmit="return saveNewProduct(event)">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div><label class="block text-sm text-gray-600 mb-1">商品名 *</label><input name="name" required class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">类别</label><input name="category" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">进价</label><input name="cost_price" type="number" step="0.01" value="0" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">售价</label><input name="selling_price" type="number" step="0.01" value="0" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">库存</label><input name="stock" type="number" value="0" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">安全库存</label><input name="min_stock" type="number" value="0" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">单位</label><input name="unit" value="个" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">供应商</label><input name="supplier" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
            </div>
            <div class="flex justify-end gap-2 mt-4">
                <button type="button" onclick="closeAddProduct()" class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                <button type="submit" class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- ──────── 编辑商品弹窗 ──────── -->
<div id="editProductModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">编辑商品</h3>
            <button onclick="closeEditProduct()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <input type="hidden" id="editProductId">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div><label class="block text-sm text-gray-600 mb-1">商品名 *</label><input id="editName" required class="w-full px-3 py-2 border rounded-lg text-sm"></div>
            <div><label class="block text-sm text-gray-600 mb-1">类别</label><input id="editCategory" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
            <div><label class="block text-sm text-gray-600 mb-1">进价</label><input id="editCostPrice" type="number" step="0.01" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
            <div><label class="block text-sm text-gray-600 mb-1">售价</label><input id="editSellingPrice" type="number" step="0.01" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
            <div><label class="block text-sm text-gray-600 mb-1">库存</label><input id="editStock" type="number" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
            <div><label class="block text-sm text-gray-600 mb-1">安全库存</label><input id="editMinStock" type="number" value="0" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
            <div><label class="block text-sm text-gray-600 mb-1">单位</label><input id="editUnit" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
            <div><label class="block text-sm text-gray-600 mb-1">供应商</label><input id="editSupplier" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
        </div>
        <div class="flex justify-end gap-2 mt-4">
            <button type="button" onclick="closeEditProduct()" class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
            <button type="button" onclick="saveEditProduct()" class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">保存</button>
        </div>
    </div>
</div>

<!-- ──────── 库存盘点弹窗 ──────── -->
<div id="adjustStockModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4 p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">📊 库存盘点</h3>
            <button onclick="closeAdjustStock()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <input type="hidden" id="adjustProductId">
        <div class="mb-3">
            <label class="block text-sm text-gray-600 mb-1">商品</label>
            <div id="adjustProductName" class="text-sm font-medium text-gray-800"></div>
        </div>
        <div class="mb-3">
            <label class="block text-sm text-gray-600 mb-1">当前库存</label>
            <div id="adjustCurrentStock" class="text-sm text-gray-500"></div>
        </div>
        <div class="mb-3">
            <label class="block text-sm text-gray-600 mb-1">调整后库存 *</label>
            <input id="adjustNewStock" type="number" min="0" class="w-full px-3 py-2 border rounded-lg text-sm">
        </div>
        <div class="mb-3">
            <label class="block text-sm text-gray-600 mb-1">调整原因</label>
            <input id="adjustReason" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="如：盘点损耗">
        </div>
        <div class="flex justify-end gap-2 mt-4">
            <button type="button" onclick="closeAdjustStock()" class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
            <button type="button" onclick="saveAdjustStock()" class="px-4 py-2 text-sm text-white bg-orange-600 rounded-lg hover:bg-orange-700">确认调整</button>
        </div>
    </div>
</div>

<!-- ──────── 新增入库弹窗 ──────── -->
<div id="addInboundModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">📦 新增入库</h3>
            <button onclick="closeAddInbound()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <div class="space-y-3">
            <div>
                <label class="block text-sm text-gray-600 mb-1">商品 *</label>
                <div id="inboundProductSelect"><select class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg"><option>加载中...</option></select></div>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">入库日期</label>
                <input id="inboundDate" type="date" class="w-full px-3 py-2 border rounded-lg text-sm">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">数量 *</label>
                    <input id="inboundQty" type="number" min="1" value="1" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">进货单价</label>
                    <input id="inboundUnitCost" type="number" step="0.01" value="0" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">供应商</label>
                <input id="inboundSupplier" class="w-full px-3 py-2 border rounded-lg text-sm">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">操作员</label>
                <input id="inboundOperator" class="w-full px-3 py-2 border rounded-lg text-sm">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">备注</label>
                <textarea id="inboundRemark" class="w-full px-3 py-2 border rounded-lg text-sm" rows="2"></textarea>
            </div>
        </div>
        <div class="flex justify-end gap-2 mt-4">
            <button type="button" onclick="closeAddInbound()" class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
            <button type="button" onclick="saveInbound()" class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">保存入库</button>
        </div>
    </div>
</div>

{% block page_js %}
<script src="/static/js/products.js"></script>
{% endblock %}
{% endblock %}
