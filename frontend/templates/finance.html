{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-semibold text-gray-800">收入支出报表</h2>
    <div class="flex gap-2">
        <button onclick="document.getElementById('addIncomeModal').classList.remove('hidden')"
                class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 text-sm">+ 收入</button>
        <button onclick="document.getElementById('addExpenseModal').classList.remove('hidden')"
                class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 text-sm">+ 支出</button>
    </div>
</div>

<!-- 月份筛选 -->
<div class="mb-4 flex gap-2">
    <input type="number" id="yearFilter" value="{{ today.year }}" class="w-20 px-3 py-2 border rounded-lg text-sm" placeholder="年"
           onchange="loadFinanceTable()">
    <input type="number" id="monthFilter" value="{{ today.month }}" class="w-16 px-3 py-2 border rounded-lg text-sm" placeholder="月" min="1" max="12"
           onchange="loadFinanceTable()">
    <button onclick="loadFinanceTable()" class="px-3 py-2 text-sm bg-gray-100 border rounded-lg hover:bg-gray-200">查询</button>
</div>

<!-- 筛选栏 -->
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-3 mb-3">
    <div class="flex flex-wrap items-center gap-2">
        <input type="text" id="filterQ" placeholder="搜索备注/来源/收款方..."
               class="w-52 px-3 py-1.5 border rounded-lg text-sm"
               onkeydown="if(event.key==='Enter')doSearch()">
        <select id="filterCategory" class="px-2 py-1.5 border rounded-lg text-sm bg-white">
            <option value="">全部分类</option>
        </select>
        <button onclick="doSearch()" class="px-3 py-1.5 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700">查询</button>
        <button onclick="resetFilters()" class="px-3 py-1.5 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">重置</button>
    </div>
</div>

<!-- 汇总卡片 -->
<div id="financeSummary" hx-get="/api/finance/summary?year={{ today.year }}&month={{ today.month }}" hx-trigger="load">
    <div class="text-center py-4 text-gray-400">加载统计...</div>
</div>

<!-- Tab 切换 + 导出 -->
<div class="flex gap-1 mb-4">
    <button id="tabIncome" onclick="switchFinanceTab('income')" class="px-4 py-2 text-sm rounded-lg bg-green-600 text-white">收入明细</button>
    <button id="tabExpense" onclick="switchFinanceTab('expense')" class="px-4 py-2 text-sm rounded-lg bg-gray-200 text-gray-600 hover:bg-gray-300">支出明细</button>
    <div class="flex-1"></div>
    <button onclick="exportCSV()" class="px-3 py-2 text-sm bg-green-100 text-green-700 rounded-lg hover:bg-green-200">导出 CSV</button>
</div>

<div id="incomeSection">
    <div id="incomeTable" hx-get="/api/finance/income/table?year={{ today.year }}&month={{ today.month }}" hx-trigger="load"><div class="text-center py-8 text-gray-400">加载中...</div></div>
</div>
<div id="expenseSection" class="hidden">
    <div id="expenseTable" hx-get="/api/finance/expense/table?year={{ today.year }}&month={{ today.month }}" hx-trigger="load"><div class="text-center py-8 text-gray-400">加载中...</div></div>
</div>

{% block page_js %}
<script src="/static/js/finance.js"></script>
{% endblock %}
<!-- 新增收入 -->
<div id="addIncomeModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">新增收入</h3>
            <button onclick="document.getElementById('addIncomeModal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <form id="incomeForm">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div><label class="block text-sm text-gray-600 mb-1">日期</label><input name="income_date" type="date" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">类别</label>
                    <select name="category" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="售课收入">售课收入</option><option value="商品零售">商品零售</option><option value="会籍卡">会籍卡</option><option value="私教课程">私教课程</option><option value="团课收入">团课收入</option><option value="储物柜租金">储物柜租金</option><option value="其他">其他</option>
                    </select>
                </div>
                <div><label class="block text-sm text-gray-600 mb-1">金额 *</label><input name="amount" type="number" step="0.01" required class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">来源</label><input name="source" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">支付方式</label>
                    <select name="payment_method" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="">选择</option><option value="现金">现金</option><option value="微信">微信</option><option value="支付宝">支付宝</option><option value="转账">转账</option><option value="刷卡">刷卡</option><option value="对公账户">对公账户</option>
                    </select>
                </div>
            </div>
            <div class="mt-3"><label class="block text-sm text-gray-600 mb-1">备注</label><textarea name="remark" rows="2" class="w-full px-3 py-2 border rounded-lg text-sm"></textarea></div>
            <div class="flex justify-end gap-2 mt-4">
                <button type="button" onclick="document.getElementById('addIncomeModal').classList.add('hidden')" class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                <button type="button" onclick="submitIncome()" class="px-4 py-2 text-sm text-white bg-green-600 rounded-lg hover:bg-green-700">保存</button>
            </div>
        </form>
    </div>
</div>

                    </select>
                </div>

                <div><label class="block text-sm text-gray-600 mb-1">支付方式</label>

                        <option value="">选择</option><option value="现金">现金</option><option value="微信">微信</option><option value="支付宝">支付宝</option><option value="转账">转账</option><option value="刷卡">刷卡</option><option value="对公账户">对公账户</option>
                    </select>
                </div>
            </div>
            <div class="mt-3"><label class="block text-sm text-gray-600 mb-1">备注</label><textarea name="remark" rows="2" class="w-full px-3 py-2 border rounded-lg text-sm"></textarea></div>
            <div class="flex justify-end gap-2 mt-4">
                <button type="button" onclick="document.getElementById('addExpenseModal').classList.add('hidden')" class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                <button type="button" onclick="submitExpense()" class="px-4 py-2 text-sm text-white bg-red-600 rounded-lg hover:bg-red-700">保存</button>
            </div>
        </form>
    </div>
</div>

            <h3 class="text-lg font-semibold">编辑收入</h3>
            <button onclick="closeEditIncomeModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>

        <form id="editIncomeForm">

                    </select>

                <div><label class="block text-sm text-gray-600 mb-1">来源</label><input id="editIncomeSource" name="source" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">支付方式</label>
                    <select id="editIncomePayment" name="payment_method" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="">选择</option><option value="现金">现金</option><option value="微信">微信</option><option value="支付宝">支付宝</option><option value="转账">转账</option><option value="刷卡">刷卡</option><option value="对公账户">对公账户</option>
                    </select>

            </div>
            <div class="mt-3"><label class="block text-sm text-gray-600 mb-1">备注</label><textarea id="editIncomeRemark" name="remark" rows="2" class="w-full px-3 py-2 border rounded-lg text-sm"></textarea></div>
            <div class="flex justify-end gap-2 mt-4">

                <button type="button" onclick="submitEditIncome()" class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">保存修改</button>
            </div>
        </form>
    </div>
</div>

</div>
{% endblock %}
