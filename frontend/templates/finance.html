{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-semibold text-gray-800">收入支出报表</h2>
    <div class="flex gap-2">
        <button onclick="document.getElementById('addIncomeModal').classList.remove('hidden')"
                class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 text-sm">+ 收入</button>
        <button onclick="document.getElementById('addExpenseModal').classList.remove('hidden')"
                class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 text-sm">+ 支出</button>
    </div>
</div>

<!-- 月份筛选 -->
<div class="mb-4 flex gap-2">
    <input type="number" id="yearFilter" value="{{ today.year }}" class="w-20 px-3 py-2 border rounded-lg text-sm" placeholder="年"
           onchange="loadFinanceTable()">
    <input type="number" id="monthFilter" value="{{ today.month }}" class="w-16 px-3 py-2 border rounded-lg text-sm" placeholder="月" min="1" max="12"
           onchange="loadFinanceTable()">
    <button onclick="loadFinanceTable()" class="px-3 py-2 text-sm bg-gray-100 border rounded-lg hover:bg-gray-200">查询</button>
</div>

<!-- 筛选栏 -->
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-3 mb-3">
    <div class="flex flex-wrap items-center gap-2">
        <input type="text" id="filterQ" placeholder="搜索备注/来源/收款方..."
               class="w-52 px-3 py-1.5 border rounded-lg text-sm"
               onkeydown="if(event.key==='Enter')doSearch()">
        <select id="filterCategory" class="px-2 py-1.5 border rounded-lg text-sm bg-white">
            <option value="">全部分类</option>
        </select>
        <button onclick="doSearch()" class="px-3 py-1.5 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700">查询</button>
        <button onclick="resetFilters()" class="px-3 py-1.5 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">重置</button>
    </div>
</div>

<!-- 汇总卡片 -->
<div id="financeSummary" hx-get="/api/finance/summary?year={{ today.year }}&month={{ today.month }}" hx-trigger="load">
    <div class="text-center py-4 text-gray-400">加载统计...</div>
</div>

<!-- Tab 切换 + 导出 -->
<div class="flex gap-1 mb-4">
    <button id="tabIncome" onclick="switchFinanceTab('income')" class="px-4 py-2 text-sm rounded-lg bg-green-600 text-white">收入明细</button>
    <button id="tabExpense" onclick="switchFinanceTab('expense')" class="px-4 py-2 text-sm rounded-lg bg-gray-200 text-gray-600 hover:bg-gray-300">支出明细</button>
    <div class="flex-1"></div>
    <button onclick="exportCSV()" class="px-3 py-2 text-sm bg-green-100 text-green-700 rounded-lg hover:bg-green-200">导出 CSV</button>
</div>

<div id="incomeSection">
    <div id="incomeTable" hx-get="/api/finance/income/table?year={{ today.year }}&month={{ today.month }}" hx-trigger="load"><div class="text-center py-8 text-gray-400">加载中...</div></div>
</div>
<div id="expenseSection" class="hidden">
    <div id="expenseTable" hx-get="/api/finance/expense/table?year={{ today.year }}&month={{ today.month }}" hx-trigger="load"><div class="text-center py-8 text-gray-400">加载中...</div></div>
</div>

<script>
var currentTab = 'income';
var currentPage = 1;

// ── 切换 tab ──
function switchFinanceTab(tab) {
    currentTab = tab;
    currentPage = 1;
    document.getElementById('incomeSection').classList.toggle('hidden', tab !== 'income');
    document.getElementById('expenseSection').classList.toggle('hidden', tab !== 'expense');
    document.getElementById('tabIncome').className = (tab === 'income' ? 'px-4 py-2 text-sm rounded-lg bg-green-600 text-white' : 'px-4 py-2 text-sm rounded-lg bg-gray-200 text-gray-600 hover:bg-gray-300');
    document.getElementById('tabExpense').className = (tab === 'expense' ? 'px-4 py-2 text-sm rounded-lg bg-green-600 text-white' : 'px-4 py-2 text-sm rounded-lg bg-gray-200 text-gray-600 hover:bg-gray-300');
    updateFilterCategories();
    loadFinanceTable();
}

// ── 分类下拉动态更新 ──
var incomeCategories = ['售课收入', '商品零售', '会籍卡', '私教课程', '团课收入', '储物柜租金', '其他'];
var expenseCategories = ['房租', '物业水电', '工资', '设备', '办公用品', '快递费', '打印费', '通讯费', '差旅费', '招待费', '维修费', '网络费', '保险费', '税费', '其他'];

function updateFilterCategories() {
    var sel = document.getElementById('filterCategory');
    var cats = currentTab === 'income' ? incomeCategories : expenseCategories;
    var currentVal = sel.value;
    sel.innerHTML = '<option value="">全部分类</option>';
    cats.forEach(function(c) {
        var opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        if (c === currentVal) opt.selected = true;
        sel.appendChild(opt);
    });
}
updateFilterCategories();

// ── 加载表格（带筛选 + 分页）─ ─
function loadFinanceTable() {
    var y = document.getElementById('yearFilter').value || {{ today.year }};
    var m = document.getElementById('monthFilter').value || {{ today.month }};
    var q = document.getElementById('filterQ').value;
    var cat = document.getElementById('filterCategory').value;
    var url = '/api/finance/' + currentTab + '/table?year=' + y + '&month=' + m + '&page=' + currentPage;
    if (q) url += '&q=' + encodeURIComponent(q);
    if (cat) url += '&category=' + encodeURIComponent(cat);
    fetch(url).then(function(r) { return r.text(); }).then(function(html) {
        document.getElementById(currentTab === 'income' ? 'incomeTable' : 'expenseTable').innerHTML = html;
    });
    // 刷新汇总
    document.getElementById('financeSummary').setAttribute('hx-get', '/api/finance/summary?year='+y+'&month='+m);
    htmx.trigger('#financeSummary', 'load');
}

// ── 分页 ──
function goPage(p) {
    currentPage = p;
    loadFinanceTable();
}

// ── 筛选 ──
function doSearch() {
    currentPage = 1;
    loadFinanceTable();
}
function resetFilters() {
    document.getElementById('filterQ').value = '';
    document.getElementById('filterCategory').value = '';
    currentPage = 1;
    loadFinanceTable();
}

// ── CSV 导出 ──
function exportCSV() {
    var y = document.getElementById('yearFilter').value || {{ today.year }};
    var m = document.getElementById('monthFilter').value || {{ today.month }};
    var q = document.getElementById('filterQ').value;
    var cat = document.getElementById('filterCategory').value;
    var url = '/api/finance/export?type=' + currentTab + '&year=' + y + '&month=' + m;
    if (q) url += '&q=' + encodeURIComponent(q);
    if (cat) url += '&category=' + encodeURIComponent(cat);
    window.open(url, '_blank');
}

// ── 新增收入 ──
function submitIncome() {
    const form = document.getElementById('incomeForm');
    if (!form.checkValidity()) { form.reportValidity(); return; }
    const data = Object.fromEntries(new FormData(form));
    data.amount = parseFloat(data.amount) || 0;
    fetch('/api/finance/income', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(r => {
        if (!r.ok) throw new Error('保存失败');
        document.getElementById('addIncomeModal').classList.add('hidden');
        form.reset();
        currentPage = 1;
        switchFinanceTab('income');
    }).catch(e => alert('保存失败: ' + e.message));
}

// ── 新增支出 ──
function submitExpense() {
    const form = document.getElementById('expenseForm');
    if (!form.checkValidity()) { form.reportValidity(); return; }
    const data = Object.fromEntries(new FormData(form));
    data.amount = parseFloat(data.amount) || 0;
    fetch('/api/finance/expense', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(r => {
        if (!r.ok) throw new Error('保存失败');
        document.getElementById('addExpenseModal').classList.add('hidden');
        form.reset();
        currentPage = 1;
        switchFinanceTab('expense');
    }).catch(e => alert('保存失败: ' + e.message));
}

// ── 编辑收入 ──
var editIncomeId = null;

function openEditIncome(id) {
    editIncomeId = id;
    fetch('/api/finance/income/' + id)
        .then(function(r) { if (!r.ok) throw new Error('获取失败'); return r.json(); })
        .then(function(d) {
            document.getElementById('editIncomeId').value = id;
            document.getElementById('editIncomeDate').value = d.income_date || '';
            document.getElementById('editIncomeCategory').value = d.category || '';
            document.getElementById('editIncomeAmount').value = d.amount || 0;
            document.getElementById('editIncomeSource').value = d.source || '';
            document.getElementById('editIncomePayment').value = d.payment_method || '';
            document.getElementById('editIncomeRemark').value = d.remark || '';
            document.getElementById('editIncomeModal').classList.remove('hidden');
        })
        .catch(function(e) { alert('加载失败: ' + e.message); });
}

function closeEditIncomeModal() {
    document.getElementById('editIncomeModal').classList.add('hidden');
    editIncomeId = null;
}

function submitEditIncome() {
    const form = document.getElementById('editIncomeForm');
    if (!form.checkValidity()) { form.reportValidity(); return; }
    const data = Object.fromEntries(new FormData(form));
    data.amount = parseFloat(data.amount) || 0;
    fetch('/api/finance/income/' + editIncomeId, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(r => {
        if (!r.ok) throw new Error('保存失败');
        closeEditIncomeModal();
        loadFinanceTable();
    }).catch(e => alert('保存失败: ' + e.message));
}

// ── 编辑支出 ──

            document.getElementById('editExpensePayee').value = d.payee || '';
            document.getElementById('editExpensePayment').value = d.payment_method || '';
            document.getElementById('editExpenseRemark').value = d.remark || '';
            document.getElementById('editExpenseModal').classList.remove('hidden');
        })
        .catch(function(e) { alert('加载失败: ' + e.message); });

function closeEditExpenseModal() {

}

function submitEditExpense() {
    const form = document.getElementById('editExpenseForm');
    if (!form.checkValidity()) { form.reportValidity(); return; }

    data.amount = parseFloat(data.amount) || 0;
    fetch('/api/finance/expense/' + editExpenseId, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(r => {
        if (!r.ok) throw new Error('保存失败');
        closeEditExpenseModal();
        loadFinanceTable();
    }).catch(e => alert('保存失败: ' + e.message));
}
</script>
