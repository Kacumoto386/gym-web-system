{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-semibold text-gray-800">💳 售课业绩</h2>
    <select id="periodSelect"
            class="px-3 py-2 border rounded-lg text-sm bg-white shadow-sm">
        <option value="今日">今日</option>
        <option value="本周">本周</option>
        <option value="本月" selected>本月</option>
        <option value="上月">上月</option>
        <option value="本年">本年</option>
        <option value="全部">全部</option>
    </select>
</div>

<div id="statsCards" hx-get="/api/performance/sales/stats?period=本月" hx-trigger="load">
    <div class="text-center py-8 text-gray-400">加载中...</div>
</div>

<!-- 状态筛选 -->
<div class="mb-4 flex gap-2">
    <button class="status-filter px-3 py-1.5 text-sm rounded-lg bg-blue-600 text-white" data-status="all">全部</button>
    <button class="status-filter px-3 py-1.5 text-sm rounded-lg bg-gray-200 text-gray-600 hover:bg-gray-300" data-status="normal">正常</button>
    <button class="status-filter px-3 py-1.5 text-sm rounded-lg bg-orange-100 text-orange-700 hover:bg-orange-200" data-status="expiring">即将到期</button>
    <button class="status-filter px-3 py-1.5 text-sm rounded-lg bg-red-100 text-red-700 hover:bg-red-200" data-status="expired">已过期</button>
    <span class="text-xs text-gray-400 ml-auto self-center">点击表头可排序</span>
</div>

<div id="saleTable" hx-get="/api/performance/sales/table?period=本月&status=all" hx-trigger="load">
    <div class="text-center py-8 text-gray-400">加载中...</div>
</div>

<script>
// 状态筛选按钮联动
document.addEventListener('click', function(e) {
    const btn = e.target.closest('.status-filter');
    if (!btn) return;
    document.querySelectorAll('.status-filter').forEach(b =>
        b.className = b.dataset.status === btn.dataset.status
            ? 'status-filter px-3 py-1.5 text-sm rounded-lg bg-blue-600 text-white'
            : 'status-filter px-3 py-1.5 text-sm rounded-lg bg-gray-200 text-gray-600 hover:bg-gray-300'
    );
    const period = document.getElementById('periodSelect')?.value || '本月';
    htmx.ajax('GET', `/api/performance/sales/table?period=${period}&status=${btn.dataset.status}`, {target: '#saleTable'});
});

// 时间筛选联动
document.getElementById('periodSelect')?.addEventListener('change', function() {
    const period = this.value;
    htmx.ajax('GET', `/api/performance/sales/stats?period=${period}`, {target: '#statsCards'});
    htmx.ajax('GET', `/api/performance/sales/table?period=${period}&status=all`, {target: '#saleTable'});
});
</script>
{% endblock %}
