{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-semibold text-gray-800">员工管理</h2>
    <button onclick="document.getElementById('addModal').classList.remove('hidden')"
            class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">
        + 新增员工
    </button>
</div>

<!-- 搜索栏 -->
<div class="mb-4">
    <input type="text" id="searchInput"
           placeholder="搜索员工姓名/手机号..."
           class="w-full md:w-80 px-4 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
           hx-get="/api/staff/search"
           hx-trigger="keyup changed delay:300ms"
           hx-target="#staffTable"
           hx-params="q">
</div>

<!-- 员工表格 -->
<div id="staffTable" hx-get="/api/staff/table" hx-trigger="load">
    <div class="text-center py-8 text-gray-400">加载中...</div>
</div>

<!-- 新增员工对话框 -->
<div id="addModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">新增员工</h3>
            <button onclick="document.getElementById('addModal').classList.add('hidden')"
                    class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <form hx-post="/api/staff" hx-target="#staffTable" hx-on::after-request="if(event.detail.successful){document.getElementById('addModal').classList.add('hidden'); this.reset();}">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">姓名 *</label>
                    <input name="name" required class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">性别</label>
                    <select name="gender" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">手机号 *</label>
                    <input name="phone" required class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">岗位</label>
                    <input name="position" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="教练/销售/前台">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">基本工资</label>
                    <input name="base_salary" type="number" step="0.01" value="0" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">销售提成比例</label>
                    <input name="sale_commission_rate" type="number" step="0.01" value="0" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
            </div>
            <div class="mt-4">
                <label class="block text-sm text-gray-600 mb-1">备注</label>
                <textarea name="remark" rows="2" class="w-full px-3 py-2 border rounded-lg text-sm"></textarea>
            </div>
            <div class="flex justify-end gap-2 mt-6">
                <button type="button" onclick="document.getElementById('addModal').classList.add('hidden')"
                        class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                <button type="submit" class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 编辑员工对话框 -->
<div id="editModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">编辑员工</h3>
            <button onclick="document.getElementById('editModal').classList.add('hidden')"
                    class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <form id="editForm" hx-put="" hx-target="#staffTable" hx-on::after-request="if(event.detail.successful){document.getElementById('editModal').classList.add('hidden');}">
            <div class="grid grid-cols-2 gap-4">
                <div><label class="block text-sm text-gray-600 mb-1">姓名 *</label><input name="name" id="edit_name" required class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">性别</label>
                    <select name="gender" id="edit_gender" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="男">男</option><option value="女">女</option>
                    </select>
                </div>
                <div><label class="block text-sm text-gray-600 mb-1">手机号 *</label><input name="phone" id="edit_phone" required class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">岗位</label><input name="position" id="edit_position" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">基本工资</label><input name="base_salary" id="edit_base_salary" type="number" step="0.01" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="block text-sm text-gray-600 mb-1">销售提成比例</label><input name="sale_commission_rate" id="edit_sale_commission_rate" type="number" step="0.01" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
            </div>
            <div class="mt-4"><label class="block text-sm text-gray-600 mb-1">备注</label><textarea name="remark" id="edit_remark" rows="2" class="w-full px-3 py-2 border rounded-lg text-sm"></textarea></div>
            <div class="flex justify-end gap-2 mt-6">
                <button type="button" onclick="document.getElementById('editModal').classList.add('hidden')" class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                <button type="submit" class="px-4 py-2 text-sm text-white bg-green-600 rounded-lg hover:bg-green-700">保存修改</button>
            </div>
        </form>
    </div>
</div>

<script>
function openEditStaff(staffId) {
    fetch('/api/staff/' + staffId)
        .then(r => r.json())
        .then(data => {
            document.getElementById('edit_name').value = data.name || '';
            document.getElementById('edit_gender').value = data.gender || '男';
            document.getElementById('edit_phone').value = data.phone || '';
            document.getElementById('edit_position').value = data.position || '';
            document.getElementById('edit_base_salary').value = data.base_salary || 0;
            document.getElementById('edit_sale_commission_rate').value = data.sale_commission_rate || 0;
            document.getElementById('edit_remark').value = data.remark || '';
            document.getElementById('editForm').setAttribute('hx-put', '/api/staff/' + staffId);
            document.getElementById('editModal').classList.remove('hidden');
        });
}
</script>
{% endblock %}
