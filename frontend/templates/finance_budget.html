{% extends "base.html" %}
{% block content %}
<div class="px-6 py-5">
    <div class="flex items-center justify-between mb-4">
        <h1 class="text-lg font-bold text-gray-800">预算管理</h1>
        <button class="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700" onclick="openAddBudget()">+ 添加预算</button>
    </div>

    <!-- 月份选择 -->
    <div class="flex items-center gap-2 mb-4">
        <label class="text-sm text-gray-500">月份</label>
        <input type="month" id="budgetMonth" class="px-3 py-1.5 border rounded text-sm"
               onchange="loadBudget()">
        <div class="flex gap-1 ml-2">
            <button class="px-3 py-1.5 rounded text-sm font-medium bg-blue-600 text-white" id="tabExpense" onclick="switchType('expense')">支出预算</button>
            <button class="px-3 py-1.5 rounded text-sm bg-gray-200 text-gray-600 hover:bg-gray-300" id="tabIncome" onclick="switchType('income')">收入预算</button>
        </div>
    </div>

    <!-- 概览卡片 -->
    <div id="budgetOverview" hx-get="/api/finance-budget/overview" hx-trigger="load" hx-swap="innerHTML">
        <div class="text-center py-4 text-gray-400 text-sm">加载概览...</div>
    </div>

    <!-- 预算明细表 -->
    <div id="budgetTable" hx-get="/api/finance-budget/table?type=expense" hx-trigger="load" hx-swap="innerHTML">
        <div class="text-center py-8 text-gray-400">加载预算明细...</div>
    </div>
</div>

<!-- 添加/编辑预算弹窗 -->
<div id="budgetModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/30" onclick="if(event.target===this)closeBudgetModal()">
    <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md mx-4" onclick="event.stopPropagation()">
        <h3 class="text-base font-bold mb-4" id="budgetModalTitle">添加预算</h3>
        <input type="hidden" id="editBudgetId">
        <div class="space-y-3">
            <div>
                <label class="text-xs text-gray-500 block mb-1">预算类别</label>
                <select id="budgetCategory" class="w-full border rounded-lg px-3 py-2 text-sm"></select>
            </div>
            <div>
                <label class="text-xs text-gray-500 block mb-1">预算金额</label>
                <input type="number" id="budgetAmount" step="0.01" min="0" class="w-full border rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
                <label class="text-xs text-gray-500 block mb-1">备注</label>
                <input type="text" id="budgetNote" class="w-full border rounded-lg px-3 py-2 text-sm">
            </div>
        </div>
        <div class="flex justify-end gap-2 mt-4">
            <button class="px-4 py-2 text-sm rounded-lg border hover:bg-gray-50" onclick="closeBudgetModal()">取消</button>
            <button class="px-4 py-2 text-sm rounded-lg bg-blue-600 text-white hover:bg-blue-700" onclick="submitBudget()">保存</button>
        </div>
    </div>
</div>
{% endblock %}

{% block page_js %}
<script src="/static/js/finance_budget.js"></script>
{% endblock %}
