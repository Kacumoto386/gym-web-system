{% extends "base.html" %}
{% block content %}

<div class="mb-6">
    <div class="flex items-center justify-between">
        <div>
            <h2 class="text-xl font-semibold text-gray-800">📦 课程包管理</h2>
            <p class="text-sm text-gray-400 mt-1">管理课程包产品及会员已购课包</p>
        </div>
        <button onclick="openAddProduct()"
                class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm font-medium shadow-sm">
            ＋ 新建课程包
        </button>
    </div>

    <!-- Tab 切换（简约风格） -->
    <div class="flex gap-0 mt-5 border-b border-gray-200">
        <button id="tabProducts" onclick="switchTab('products')"
                class="px-5 py-2.5 text-sm font-medium border-b-2 border-blue-600 text-blue-600">
            📦 产品管理
        </button>
        <button id="tabMember" onclick="switchTab('member')"
                class="px-5 py-2.5 text-sm font-medium text-gray-500 hover:text-gray-700">
            🛒 已售课程包
        </button>
        <button id="tabMonthlyPass" onclick="switchTab('monthlypass')"
                class="px-5 py-2.5 text-sm font-medium text-gray-500 hover:text-gray-700">
            🎫 包月管理
        </button>
    </div>
</div>

<!-- ═══ Tab 1: 产品管理 ═══ -->
<div id="tabProductsContent">
    <div id="productTableArea" hx-preserve="true">
        {{ products_html | safe }}
    </div>
</div>

<!-- ═══ Tab 2: 已售课程包 ═══ -->
<div id="tabMemberContent" style="display:none">
    <!-- 搜索栏 -->
    <div class="flex flex-wrap items-center gap-2 mb-4 bg-white p-3 rounded-lg shadow-sm border">
        <div class="relative flex-1 min-w-[200px]">
            <span class="absolute left-3 top-2.5 text-gray-400 text-sm">🔍</span>
            <input type="text" id="mpKeyword" placeholder="搜索会员姓名..."
                   class="w-full pl-8 pr-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
        </div>
        <select id="mpStatus" class="px-3 py-2 border rounded-lg text-sm bg-white">
            <option value="">全部状态</option>
            <option value="有效">有效</option>
            <option value="正常">正常</option>
            <option value="已过期">已过期</option>
            <option value="已用完">已用完</option>
        </select>
        <button onclick="searchMemberPackages()"
                class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700">查询</button>
    </div>
    <div id="memberPackageTableArea">
        {{ member_html | safe }}
    </div>
</div>

<!-- ═══ Tab 3: 包月管理 ═══ -->
<div id="tabMonthlyPassContent" style="display:none">
    <div class="flex items-center justify-between mb-4">
        <span class="text-sm font-medium text-gray-700">🎫 包月记录管理</span>
        <button onclick="openAddMonthlyPass()"
                class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">+ 新建包月</button>
    </div>
    <div id="monthlyPassTable" hx-get="/api/packages/monthly-passes/table" hx-trigger="load">
        <div class="text-center py-8 text-gray-400">加载中...</div>
    </div>
</div>

{% block page_js %}
<script src="/static/js/packages.js"></script>
{% endblock %}

<!-- ════════════════════════════════════════════ -->
<!-- 产品新建/编辑弹窗 -->
<!-- ════════════════════════════════════════════ -->
<div id="productModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto p-6">
        <div class="flex justify-between items-center mb-5">
            <h3 class="text-lg font-semibold text-gray-800" id="productModalTitle">新建课程包</h3>
            <button onclick="closeProductModal()"
                    class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
        </div>
        <form id="productForm" hx-post="/api/packages/products" hx-target="#productTableArea"
              hx-on::after-request="if(event.detail.successful){closeProductModal();}">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">包名称 <span class="text-red-400">*</span></label>
                    <input name="package_name" required
                           class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-blue-400">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">类型</label>
                        <select name="package_type" onchange="toggleCountField(this)"
                                class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                            <option value="计次打包">🎯 计次打包（按次扣减）</option>
                            <option value="不限次数">♾️ 不限次数（有效期无忧）</option>
                        </select>
                    </div>
                    <div id="countField">
                        <label class="block text-sm font-medium text-gray-700 mb-1">次数</label>
                        <input name="total_count" type="number" value="0"
                               class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">包含课程 <span class="text-red-400">*</span></label>
                    <div id="courseSelectContainer"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">标准售价（元）</label>
                        <input name="standard_price" type="number" step="0.01" value="0"
                               class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">优惠售价（元）</label>
                        <input name="discount_price" type="number" step="0.01" value="0"
                               class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">有效期（天）</label>
                        <input name="valid_days" type="number" value="30"
                               class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                    <textarea name="remark" rows="2"
                              class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-6 pt-4 border-t">
                <button type="button" onclick="closeProductModal()"
                        class="px-4 py-2 text-sm text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200">取消</button>
                <button type="submit"
                        class="px-5 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700 shadow-sm" id="productSaveBtn">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- ════════════════════════════════════════════ -->
<!-- 包月管理 新建/编辑弹窗 -->
<!-- ════════════════════════════════════════════ -->
<div id="monthlyPassModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto p-6">
        <div class="flex justify-between items-center mb-5">
            <h3 class="text-lg font-semibold text-gray-800" id="mpModalTitle">新建包月</h3>
            <button onclick="closeMonthlyPassModal()"
                    class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
        </div>
        <input type="hidden" id="mpEditPassId">
        <div class="space-y-4">
            <div class="relative">
                <label class="block text-sm font-medium text-gray-700 mb-1">会员 <span class="text-red-400">*</span></label>
                <div class="flex gap-2">
                    <input id="mpMemberSearch" type="text" placeholder="输入会员编号/姓名/手机号"
                           class="flex-1 px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
                           oninput="searchMemberMP()">
                    <input id="mpMemberName" readonly
                           class="w-28 px-3 py-2.5 border rounded-lg text-sm bg-gray-50">
                </div>
                <div id="mpMemberResults" class="hidden bg-white border rounded-lg shadow-lg max-h-40 overflow-y-auto absolute z-50 w-full" style="top:100%;left:0"></div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">名称 <span class="text-red-400">*</span></label>
                <input id="mpPassName" required
                       class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">类型</label>
                    <select id="mpPassType"
                            class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                        <option value="group">🎫 包月团课</option>
                        <option value="private">🎫 包月私教</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">售价（元）</label>
                    <input id="mpPrice" type="number" step="0.01" value="0"
                           class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">包含课程</label>
                <input id="mpCourseNames" placeholder="课程1 / 课程2"
                       class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                <p class="text-xs text-gray-400 mt-1">用 / 分隔多个课程名称</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">有效期起</label>
                    <input id="mpValidFrom" type="date"
                           class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">有效期止</label>
                    <input id="mpValidUntil" type="date"
                           class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">购买日期</label>
                    <input id="mpPurchaseDate" type="date"
                           class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                    <select id="mpStatus"
                            class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                        <option value="正常">正常</option>
                        <option value="已过期">已过期</option>
                        <option value="已用完">已用完</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                <textarea id="mpRemark" rows="2"
                          class="w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"></textarea>
            </div>
        </div>
        <div class="flex justify-end gap-3 mt-6 pt-4 border-t">
            <button type="button" onclick="closeMonthlyPassModal()"
                    class="px-4 py-2 text-sm text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200">取消</button>
            <button type="button" onclick="saveMonthlyPass()"
                    class="px-5 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700 shadow-sm">保存</button>
        </div>
    </div>
</div>


{% endblock %}
