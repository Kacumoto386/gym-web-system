{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-semibold text-gray-800">📅 教练排班</h2>
</div>

<!-- 控制栏 -->
<div class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-2">
        <button onclick="navigateMonth(-1)" class="px-3 py-1.5 border rounded-lg text-sm hover:bg-gray-50">‹ 上月</button>
        <span id="monthLabel" class="text-base font-medium text-gray-700 w-28 text-center"></span>
        <button onclick="navigateMonth(1)" class="px-3 py-1.5 border rounded-lg text-sm hover:bg-gray-50">下月 ›</button>
        <button onclick="goToday()" class="px-3 py-1.5 border rounded-lg text-sm hover:bg-gray-50 ml-2">今天</button>
    </div>
    <div>
        <select id="coachFilter" onchange="refreshCalendar()"
                class="px-3 py-1.5 border rounded-lg text-sm w-44">
            <option value="">全部教练</option>
        </select>
    </div>
</div>

<!-- 统计摘要 -->
<div id="statsSection" hx-get="/api/schedule/stats" hx-trigger="load">
    <div class="text-center py-4 text-gray-400">加载中...</div>
</div>

<!-- 月历表格 -->
<div id="calendarSection" class="mt-4" hx-get="/api/schedule/calendar" hx-trigger="load">
    <div class="text-center py-8 text-gray-400">加载月历...</div>
</div>

<!-- 日期详情（点击日期展开） -->
<div id="dayDetailSection" class="hidden">
    <!-- 由 JS 动态加载 -->
</div>

<script>
let currentYear = {{ year }};
let currentMonth = {{ month }};

// ════════════════════════════════════════════
// 初始化
// ════════════════════════════════════════════

function init() {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth() + 1;
    loadCoachList();
    refreshCalendar();
}

function loadCoachList() {
    fetch('/api/schedule/coach-list')
        .then(r => r.json())
        .then(coaches => {
            const sel = document.getElementById('coachFilter');
            sel.innerHTML = coaches.map(c =>
                `<option value="${c.staff_id}">${c.name}${c.position ? ' ('+c.position+')' : ''}</option>`
            ).join('');
        });
}

function refreshCalendar() {
    const coachId = document.getElementById('coachFilter').value;
    const params = `year=${currentYear}&month=${currentMonth}&coach_id=${coachId}`;

    // 更新月份标签
    document.getElementById('monthLabel').textContent = `${currentYear}年${currentMonth}月`;

    // 更新统计
    const statsEl = document.getElementById('statsSection');
    statsEl.innerHTML = '<div class="text-center py-4 text-gray-400">加载中...</div>';
    htmx.ajax('GET', `/api/schedule/stats?${params}`, {target: '#statsSection'});

    // 更新月历
    const calEl = document.getElementById('calendarSection');
    calEl.innerHTML = '<div class="text-center py-8 text-gray-400">加载月历...</div>';
    htmx.ajax('GET', `/api/schedule/calendar?${params}`, {target: '#calendarSection'});

    // 隐藏详情
    document.getElementById('dayDetailSection').classList.add('hidden');
}

function navigateMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    refreshCalendar();
}

function goToday() {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth() + 1;
    refreshCalendar();
}

// 点击日期显示详情
function showDayDetail(dateStr) {
    const coachId = document.getElementById('coachFilter').value;
    const section = document.getElementById('dayDetailSection');
    section.classList.remove('hidden');
    section.innerHTML = '<div class="text-center py-4 text-gray-400">加载中...</div>';

    const params = new URLSearchParams({date_str: dateStr});
    if (coachId) params.set('coach_id', coachId);

    fetch(`/api/schedule/day-detail?${params.toString()}`)
        .then(r => r.text())
        .then(html => {
            section.innerHTML = html;
            section.scrollIntoView({behavior: 'smooth', block: 'nearest'});
        });
}

// 初始化
init();
</script>
{% endblock %}
