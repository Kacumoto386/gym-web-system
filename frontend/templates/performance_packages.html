{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-semibold text-gray-800">📦 课程包业绩</h2>
    <span class="text-xs text-gray-400">🔄 点击表头排序（数字/日期自动识别）</span>
</div>

<div id="statsCards" hx-get="/api/performance/packages/stats" hx-trigger="load">
    <div class="text-center py-8 text-gray-400">加载中...</div>
</div>

<div id="packageTable" hx-get="/api/performance/packages/table" hx-trigger="load">
    <div class="text-center py-8 text-gray-400">加载中...</div>
</div>

<script>
// 全局排序机制：点击表格表头 → 服务端排序
document.addEventListener('htmx:afterSettle', function(e) {
    // 给所有带有 data-table 属性的表格附加排序监听
    const tables = document.querySelectorAll('table[data-table]');
    tables.forEach(table => {
        const thead = table.querySelector('thead');
        if (!thead || thead.dataset.sortAttached) return;
        thead.dataset.sortAttached = '1';

        thead.querySelectorAll('th[data-col]').forEach(th => {
            th.addEventListener('click', function() {
                const colIdx = this.dataset.col;
                const table = this.closest('table');
                const targetId = table?.dataset?.table;
                if (!targetId) return;

                const currentDir = this.querySelector('.sort-arrow')?.dataset?.dir || '';
                const newDir = currentDir === 'asc' ? 'desc' : 'asc';

                htmx.ajax('GET', `/api/performance/packages/table?sort=${colIdx}&dir=${newDir}`, {
                    target: '#' + targetId
                });
            });
        });
    });
});
</script>
{% endblock %}
