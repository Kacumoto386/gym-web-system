{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-3">
    <h2 class="text-xl font-semibold text-gray-800">👥 会员管理</h2>
    <button onclick="openAddMemberModal()"
            class="bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700 text-sm">
        + 新增会员
    </button>
</div>

<!-- 统计卡片 -->
<div id="memberStats" hx-get="/api/members/stats" hx-trigger="load">
    <div class="text-center py-2 text-gray-400 text-sm">加载中...</div>
</div>

<!-- 多维筛选栏 -->
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-3 mb-3">
    <div class="flex flex-wrap items-center gap-2 mb-1.5">
        <div class="relative w-52">
            <span class="absolute left-3 top-2 text-gray-400 text-sm">🔍</span>
            <input type="text" id="filterQ" placeholder="搜索姓名/手机号/编号..."
                   class="w-full pl-8 pr-2 py-1.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
        </div>
        <select id="filterLevel" class="px-2 py-1.5 border rounded-lg text-sm bg-white">
            <option value="">全部等级</option>
        </select>
        <select id="filterStatus" class="px-2 py-1.5 border rounded-lg text-sm bg-white">
            <option value="">全部状态</option>
        </select>
        <select id="filterSource" class="px-2 py-1.5 border rounded-lg text-sm bg-white">
            <option value="">全部来源</option>
        </select>
        <button onclick="doSearch()" class="px-3 py-1.5 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700">🔍 查询</button>
        <button onclick="resetFilters()" class="px-3 py-1.5 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">↻ 重置</button>
    </div>
    <div class="flex flex-wrap items-center gap-1.5">
        <select id="filterStaff" class="px-2 py-1.5 border rounded-lg text-sm bg-white">
            <option value="">全部员工</option>
        </select>
        <span class="text-xs text-gray-500">注册:</span>
        <input type="date" id="filterRegFrom" class="px-1.5 py-1.5 border rounded-lg text-sm w-24">
        <span class="text-gray-400 text-xs">~</span>
        <input type="date" id="filterRegTo" class="px-1.5 py-1.5 border rounded-lg text-sm w-24">
        <span class="text-gray-300 text-xs">|</span>
        <span class="text-xs text-gray-500">签到:</span>
        <input type="date" id="filterCheckinFrom" class="px-1.5 py-1.5 border rounded-lg text-sm w-24">
        <span class="text-gray-400 text-xs">~</span>
        <input type="date" id="filterCheckinTo" class="px-1.5 py-1.5 border rounded-lg text-sm w-24">
        <button onclick="quickDate('today')" class="px-1.5 py-0.5 text-xs border rounded hover:bg-blue-50 text-blue-600 border-blue-200">今天</button>
        <button onclick="quickDate('week')" class="px-1.5 py-0.5 text-xs border rounded hover:bg-blue-50 text-blue-600 border-blue-200">本周</button>
        <button onclick="quickDate('month')" class="px-1.5 py-0.5 text-xs border rounded hover:bg-blue-50 text-blue-600 border-blue-200">本月</button>
        <button onclick="quickDate('all')" class="px-1.5 py-0.5 text-xs border rounded hover:bg-gray-50 text-gray-500">全部</button>
    </div>
</div>

<!-- 会员表格 -->
<div id="memberTable" hx-get="/api/members/table" hx-trigger="load">
    <div class="text-center py-4 text-gray-400">加载中...</div>
</div>

<!-- 新增会员对话框 -->
<div id="addModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto p-5">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-lg font-semibold">新增会员</h3>
            <button onclick="document.getElementById('addModal').classList.add('hidden')"
                    class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <form hx-post="/api/members" hx-target="#memberTable" hx-on::after-request="if(event.detail.successful){document.getElementById('addModal').classList.add('hidden'); this.reset(); htmx.ajax('GET','/api/members/stats',{target:'#memberStats'});}">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">姓名 *</label>
                    <input name="name" id="add_name" required class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">性别</label>
                    <select name="gender" id="add_gender" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="男">男</option><option value="女">女</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">手机号 *</label>
                    <input name="phone" id="add_phone" required class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">会员等级</label>
                    <select name="level" id="add_level" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="普通">普通</option><option value="银卡">银卡</option><option value="金卡">金卡</option><option value="钻石">钻石</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">身高(cm)</label>
                    <input name="height" id="add_height" type="number" step="0.1" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">体重(kg)</label>
                    <input name="weight" id="add_weight" type="number" step="0.1" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">来源</label>
                    <input name="source" id="add_source" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="转介绍/线上/到店">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">出生日期</label>
                    <div class="flex gap-2">
                        <input name="birth_date" id="add_birth_date" type="date" class="flex-1 px-3 py-2 border rounded-lg text-sm" onchange="updateAddAge()">
                        <input id="add_age" readonly class="w-16 px-3 py-2 border bg-gray-50 rounded-lg text-sm text-gray-500 text-center" placeholder="年龄" title="自动计算">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">跟进员工</label>
                    <select name="staff_id" id="add_staff_id" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="">—— 不指定 ——</option>
                    </select>
                    <input type="hidden" name="staff_name" id="add_staff_name">
                </div>
            </div>
            <div class="mt-4">
                <label class="block text-sm text-gray-600 mb-1">备注</label>
                <textarea name="remark" id="add_remark" rows="2" class="w-full px-3 py-2 border rounded-lg text-sm"></textarea>
            </div>
            <div class="flex justify-end gap-2 mt-4">
                <button type="button" onclick="document.getElementById('addModal').classList.add('hidden')"
                        class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                <button type="submit" class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 编辑会员对话框（含照片上传） -->
<div id="editModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto p-5">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-lg font-semibold">编辑会员</h3>
            <button onclick="document.getElementById('editModal').classList.add('hidden')"
                    class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>

        <div class="flex gap-6">
            <!-- 左侧：照片区域 -->
            <div class="w-44 flex-shrink-0">
                <div class="text-sm text-gray-600 mb-2">会员照片</div>
                <div id="photoArea" class="w-40 h-48 bg-gray-100 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center overflow-hidden">
                    <div id="photoPlaceholder" class="text-center text-gray-400">
                        <div class="text-3xl mb-1">📷</div>
                        <div class="text-xs">暂无照片</div>
                    </div>
                    <img id="photoPreview" class="hidden w-full h-full object-cover" alt="会员照片">
                </div>
                <div class="flex gap-1 mt-2">
                    <label class="flex-1 cursor-pointer text-center px-2 py-1.5 text-xs bg-blue-100 text-blue-700 rounded hover:bg-blue-200">
                        📤 上传
                        <input type="file" id="photoUpload" accept="image/jpeg,image/png,image/webp" class="hidden" onchange="uploadPhoto(this)">
                    </label>
                    <button type="button" onclick="openCamera()" class="flex-1 px-2 py-1.5 text-xs bg-green-100 text-green-700 rounded hover:bg-green-200">
                        📸 拍照
                    </button>
                    <button id="deletePhotoBtn" onclick="deletePhoto()" class="hidden px-2 py-1.5 text-xs bg-red-100 text-red-700 rounded hover:bg-red-200">🗑️ 删除</button>
                </div>
                <div id="uploadProgress" class="hidden text-xs text-green-600 mt-1 text-center">上传中...</div>
            </div>

            <!-- 右侧：表单 -->
            <div class="flex-1">
                <form id="editForm" onsubmit="saveEditMember(event)">
                    <input type="hidden" id="edit_member_id" name="member_id">
                    <input type="hidden" id="edit_staff_name" name="staff_name">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div><label class="block text-sm text-gray-600 mb-1">姓名 *</label><input name="name" id="edit_name" required class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">性别</label>
                            <select name="gender" id="edit_gender" class="w-full px-3 py-2 border rounded-lg text-sm">
                                <option value="男">男</option><option value="女">女</option>
                            </select>
                        </div>
                        <div><label class="block text-sm text-gray-600 mb-1">手机号 *</label><input name="phone" id="edit_phone" required class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">会员等级</label>
                            <select name="level" id="edit_level" class="w-full px-3 py-2 border rounded-lg text-sm">
                                <option value="普通">普通</option><option value="银卡">银卡</option><option value="金卡">金卡</option><option value="钻石">钻石</option>
                            </select>
                        </div>
                        <div><label class="block text-sm text-gray-600 mb-1">身高(cm)</label><input name="height" id="edit_height" type="number" step="0.1" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                        <div><label class="block text-sm text-gray-600 mb-1">体重(kg)</label><input name="weight" id="edit_weight" type="number" step="0.1" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                        <div><label class="block text-sm text-gray-600 mb-1">来源</label><input name="source" id="edit_source" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                        <div><label class="block text-sm text-gray-600 mb-1">出生日期</label>
                            <div class="flex gap-2">
                                <input name="birth_date" id="edit_birth_date" type="date" class="flex-1 px-3 py-2 border rounded-lg text-sm" onchange="updateEditAge()">
                                <input id="edit_age" readonly class="w-16 px-3 py-2 border bg-gray-50 rounded-lg text-sm text-gray-500 text-center" placeholder="年龄" title="自动计算">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">跟进员工</label>
                            <select name="staff_id" id="edit_staff_id" class="w-full px-3 py-2 border rounded-lg text-sm">
                                <option value="">—— 不指定 ——</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-4"><label class="block text-sm text-gray-600 mb-1">备注</label><textarea name="remark" id="edit_remark" rows="2" class="w-full px-3 py-2 border rounded-lg text-sm"></textarea></div>
                    <div class="flex justify-end gap-2 mt-4">
                        <button type="button" onclick="document.getElementById('editModal').classList.add('hidden')" class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                        <button type="submit" class="px-4 py-2 text-sm text-white bg-green-600 rounded-lg hover:bg-green-700">保存修改</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>



<!-- ═══ 摄像头拍照弹窗 ═══ -->
<div id="cameraModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 p-5">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-lg font-semibold">📸 拍照</h3>
            <button onclick="closeCamera()"
                    class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>

        <!-- 视频预览 -->
        <div id="cameraPreviewWrap" class="bg-black rounded-lg overflow-hidden mb-4">
            <video id="cameraVideo" autoplay playsinline
                   class="w-full h-72 object-cover"></video>
        </div>

        <!-- 拍照预览（拍照后替换视频） -->
        <canvas id="cameraCanvas" class="hidden w-full h-72 object-cover rounded-lg mb-4 bg-black"></canvas>

        <!-- 状态提示 -->
        <div id="cameraStatus" class="text-sm text-center hidden mb-3"></div>

        <!-- 按钮 -->
        <div class="flex justify-center gap-3">
            <button id="cameraCaptureBtn" type="button" onclick="capturePhoto()"
                    class="px-6 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">
                📸 拍照
            </button>
            <button id="cameraRetakeBtn" type="button" onclick="retakePhoto()"
                    class="hidden px-6 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">
                🔄 重拍
            </button>
            <button type="button" onclick="closeCamera()"
                    class="px-6 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">
                ✕ 关闭
            </button>
        </div>
    </div>
</div>

<!-- 售卡对话框（选择卡产品） -->
<div id="sellCardModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 p-5">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-lg font-semibold">🪪 售卡</h3>
            <button onclick="document.getElementById('sellCardModal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <form id="sellCardForm" onsubmit="return false;">
            <div class="space-y-3">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">会员编号</label>
                        <input id="sellCardMemberId" readonly class="w-full px-3 py-2 border bg-gray-50 rounded-lg text-sm text-gray-500">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">会员姓名</label>
                        <input id="sellCardMemberName" readonly class="w-full px-3 py-2 border bg-gray-50 rounded-lg text-sm text-gray-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">选择会籍卡产品 *</label>
                    <select id="sellCardProduct" onchange="onSellCardProductChange()" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="">— 请选择 —</option>
                    </select>
                </div>
                <div id="sellCardProductInfo" class="hidden bg-gray-50 rounded-lg p-3 text-sm space-y-1">
                    <div>类型：<span id="sellCardTypeDisplay"></span></div>
                    <div id="sellCardClassesDisplay"></div>
                    <div>有效期：<span id="sellCardDurationDisplay"></span></div>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">售价（元）</label>
                    <input id="sellCardPrice" type="number" step="0.01" value="0" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">开始日期</label>
                    <input id="sellCardStart" type="date" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
            </div>
            <div id="sellCardResult" class="hidden text-sm text-center py-2 rounded-lg mt-3"></div>
            <div class="flex justify-end gap-2 mt-4">
                <button type="button" onclick="document.getElementById('sellCardModal').classList.add('hidden')" class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                <button type="button" onclick="submitSellCard()" class="px-4 py-2 text-sm text-white bg-green-600 rounded-lg hover:bg-green-700">💳 确认售卡</button>
            </div>
        </form>
    </div>
</div>

{% block page_js %}
<script src="/static/js/members.js"></script>
{% endblock %}
{% endblock %}
