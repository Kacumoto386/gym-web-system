{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-semibold text-gray-800">💰 资产残值查询</h2>
    <button onclick="exportCsv()"
            class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 text-sm">
        📥 导出CSV
    </button>
</div>

<!-- 搜索栏 + 筛选 -->
<div class="mb-4 flex items-center gap-3">
    <input type="text" id="searchInput"
           placeholder="搜索会员姓名/手机号/编号..."
           class="flex-1 md:w-80 px-4 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
           oninput="searchAssets(this.value)"
           autocomplete="off">
    <label class="flex items-center gap-1.5 text-sm text-gray-600 cursor-pointer select-none" title="不勾选时仅显示有资产（会籍卡/私教课/课程包）的会员">
        <input type="checkbox" id="showAllToggle" onchange="searchAssets()"
               class="rounded border-gray-300 text-blue-600 focus:ring-blue-400">
        包含零资产会员
    </label>
</div>

<!-- 汇总卡片 + 表格 -->
<div id="assetContent" hx-get="/api/asset-values/table" hx-trigger="load">
    <div class="text-center py-8 text-gray-400">加载中...</div>
</div>

<!-- ═══ 会员资产明细弹窗 ═══ -->
<div id="detailModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-4xl mx-4 max-h-[90vh] overflow-y-auto p-6">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h3 class="text-lg font-semibold" id="detailTitle">资产明细</h3>
                <div class="text-sm text-gray-400 mt-0.5" id="detailSubtitle"></div>
            </div>
            <button onclick="closeDetailModal()"
                    class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>

        <!-- 汇总 -->
        <div id="detailSummary" class="hidden grid grid-cols-4 gap-3 mb-5">
            <div class="bg-green-50 rounded-lg p-3 text-center">
                <div class="text-xs text-gray-500">🎫 会籍卡</div>
                <div class="text-lg font-bold text-green-700" id="detailCardVal">¥0</div>
            </div>
            <div class="bg-blue-50 rounded-lg p-3 text-center">
                <div class="text-xs text-gray-500">🏋️ 私教课</div>
                <div class="text-lg font-bold text-blue-700" id="detailLessonVal">¥0</div>
            </div>
            <div class="bg-purple-50 rounded-lg p-3 text-center">
                <div class="text-xs text-gray-500">📦 课程包</div>
                <div class="text-lg font-bold text-purple-700" id="detailPkgVal">¥0</div>
            </div>
            <div class="bg-gray-100 rounded-lg p-3 text-center">
                <div class="text-xs text-gray-500">💰 总计</div>
                <div class="text-lg font-bold text-gray-800" id="detailTotalVal">¥0</div>
            </div>
        </div>

        <!-- 明细列表 -->
        <div id="detailBody">
            <div class="text-center py-8 text-gray-400">加载中...</div>
        </div>

        <div class="flex justify-end mt-4">
            <button onclick="closeDetailModal()"
                    class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">关闭</button>
        </div>
    </div>
</div>

{% block page_js %}
<script src="/static/js/member_assets.js"></script>
{% endblock %}
{% endblock %}
