{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-semibold text-gray-800">手环管理</h2>
    <button onclick="document.getElementById('addModal').classList.remove('hidden')"
            class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">
        + 注册手环
    </button>
</div>

<div id="wristbandTable" hx-get="/api/wristbands/table" hx-trigger="load">
    <div class="text-center py-8 text-gray-400">加载中...</div>
</div>

<!-- 注册手环对话框 -->
<div id="addModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">注册手环</h3>
            <button onclick="document.getElementById('addModal').classList.add('hidden')"
                    class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <form hx-post="/api/wristbands" hx-target="#wristbandTable" hx-on::after-request="if(event.detail.successful){document.getElementById('addModal').classList.add('hidden'); this.reset();}">
            <div class="space-y-3">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">读卡器值 * (10位数字)</label>
                    <input name="reader_value" required pattern="\d{10}" maxlength="10"
                           class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="1234567890">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">自定义编号</label>
                    <input name="custom_id" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="手环01">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">备注</label>
                    <textarea name="remark" rows="2" class="w-full px-3 py-2 border rounded-lg text-sm"></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-6">
                <button type="button" onclick="document.getElementById('addModal').classList.add('hidden')"
                        class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                <button type="submit" class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">注册</button>
            </div>
        </form>
    </div>
</div>

<!-- 绑定会员对话框 -->
<div id="bindModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4 p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">绑定会员</h3>
            <button onclick="document.getElementById('bindModal').classList.add('hidden')"
                    class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <form hx-put="" id="bindForm" hx-target="#wristbandTable" hx-on::after-request="if(event.detail.successful){document.getElementById('bindModal').classList.add('hidden'); this.reset();}">
            <div class="space-y-3">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">会员编号</label>
                    <input name="member_id" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="M2026...">
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-6">
                <button type="button" onclick="document.getElementById('bindModal').classList.add('hidden')"
                        class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                <button type="submit" class="px-4 py-2 text-sm text-white bg-green-600 rounded-lg hover:bg-green-700">绑定</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}

{% block page_js %}
<script src="/static/js/wristband.js"></script>
{% endblock %}
