{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-semibold text-gray-800">🪪 会籍卡管理</h2>
    <button onclick="document.getElementById('addProductModal').classList.remove('hidden')"
            class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">+ 新增卡产品</button>
</div>

<!-- Tab 切换 -->
<div class="flex gap-1 mb-4 border-b border-gray-200">
    <button id="tabProducts" onclick="switchCardTab('products')" class="px-4 py-2 text-sm font-medium border-b-2 border-blue-600 text-blue-600 -mb-px">🏪 卡产品</button>
    <button id="tabSold" onclick="switchCardTab('sold')" class="px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 -mb-px">📋 已售会籍</button>
</div>

<!-- 卡产品表格 -->
<div id="cardProductTab">
    <div id="cardProductTable" hx-get="/api/membership-cards/products/table" hx-trigger="load"><div class="text-center py-8 text-gray-400">加载中...</div></div>
</div>

<!-- 已售会籍表格 -->
<div id="cardSoldTab" class="hidden">
    <div id="cardSoldTable" hx-get="/api/membership-cards/sold/table" hx-trigger="load"><div class="text-center py-8 text-gray-400">加载中...</div></div>
</div>

<!-- ══════════════════════════════ 新增卡产品对话框 ══════════════════════════════ -->
<div id="addProductModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">🏪 新增卡产品</h3>
            <button onclick="document.getElementById('addProductModal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <form onsubmit="return false;">
            <div class="space-y-3">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">卡名称</label>
                    <input id="prodName" placeholder="如：10次卡、月卡、畅炼卡" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">卡类型 *</label>
                    <select id="prodType" onchange="onProdTypeChange()" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="次卡">次卡（固定次数，按次扣）</option>
                        <option value="期限卡">期限卡（期限内不限次）</option>
                        <option value="现金卡">现金卡（储值消费）</option>
                    </select>
                </div>
                <!-- 次卡专用：可用次数 -->
                <div id="prodClassesRow">
                    <label class="block text-sm text-gray-600 mb-1">可用次数</label>
                    <input id="prodClasses" type="number" value="10" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <!-- 次卡专用：赠送次数 -->
                <div id="prodBonusRow">
                    <label class="block text-sm text-gray-600 mb-1">赠送次数</label>
                    <input id="prodBonus" type="number" value="0" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <!-- 现金卡专用：面值 -->
                <div id="prodFaceValueRow" class="hidden">
                    <label class="block text-sm text-gray-600 mb-1">面值（仅展示，不关联售价）</label>
                    <input id="prodFaceValue" type="number" step="0.01" value="0" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <!-- 通用：有效期（天） -->
                <div>
                    <label class="block text-sm text-gray-600 mb-1">有效期（天）</label>
                    <input id="prodDuration" type="number" value="365" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <!-- 通用：日期周期输入（起止日期） -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">生效日期</label>
                        <input id="prodStartDate" type="date" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">截止日期</label>
                        <input id="prodEndDate" type="date" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">售价 / 储值金额（元）</label>
                    <input id="prodPrice" type="number" step="0.01" value="0" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
            </div>
            <div id="prodResult" class="hidden text-sm text-center py-2 rounded-lg mt-3"></div>
            <div class="flex justify-end gap-2 mt-4">
                <button type="button" onclick="document.getElementById('addProductModal').classList.add('hidden')" class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                <button id="prodSaveBtn" type="button" onclick="submitProduct()" class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- ══════════════════════════════ 售卡对话框 ══════════════════════════════ -->
<div id="sellCardModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">📋 售卡</h3>
            <button onclick="document.getElementById('sellCardModal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <form onsubmit="return false;">
            <div class="space-y-3">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">会员</label>
                    <select id="sellMember" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="">先搜索会员...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">卡产品 *</label>
                    <select id="sellProduct" onchange="onSellProductChange()" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="">请选择卡产品</option>
                    </select>
                </div>
                <!-- 选中卡产品后的信息展示 -->
                <div id="sellProductInfo" class="hidden text-sm p-3 bg-gray-50 rounded-lg space-y-1"></div>
                <!-- 开始日期 -->
                <div>
                    <label class="block text-sm text-gray-600 mb-1">开卡日期</label>
                    <input id="sellStartDate" type="date" onchange="onSellDateChange()" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <!-- 截止日期（自动计算，展示） -->
                <div id="sellEndDateRow" class="hidden">
                    <label class="block text-sm text-gray-600 mb-1">到日期（自动计算）</label>
                    <input id="sellEndDate" type="date" readonly class="w-full px-3 py-2 bg-gray-100 border rounded-lg text-sm">
                </div>
                <!-- 现金卡专用：实际售价 -->
                <div id="sellPriceRow" class="hidden">
                    <label class="block text-sm text-gray-600 mb-1">实际售价（储值金额，元）</label>
                    <input id="sellPrice" type="number" step="0.01" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
            </div>
            <div id="sellResult" class="hidden text-sm text-center py-2 rounded-lg mt-3"></div>
            <div class="flex justify-end gap-2 mt-4">
                <button type="button" onclick="document.getElementById('sellCardModal').classList.add('hidden')" class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                <button type="button" onclick="submitSell()" class="px-4 py-2 text-sm text-white bg-green-600 rounded-lg hover:bg-green-700">确认售卡</button>
            </div>
        </form>
    </div>
</div>

{% block page_js %}
<script src="/static/js/membership_cards.js"></script>
{% endblock %}
{% endblock %}
