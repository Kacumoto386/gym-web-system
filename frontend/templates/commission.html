{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-semibold text-gray-800">📊 梯度提成</h2>
</div>

<!-- Tab 切换 -->
<div class="flex gap-1 mb-4">
    <button id="tabRules" onclick="switchTab('rules')" class="px-4 py-2 text-sm rounded-lg bg-blue-600 text-white">⚙️ 提成规则</button>
    <button id="tabCalc" onclick="switchTab('calc')" class="px-4 py-2 text-sm rounded-lg bg-gray-200 text-gray-600 hover:bg-gray-300">💰 佣金计算</button>
</div>

<!-- ──────── 提成规则管理 ──────── -->
<div id="rulesSection">
    <div class="flex items-center justify-between mb-3">
        <span class="text-sm text-gray-500">配置分段累进提成规则（支持售课提成 / 上课提成）</span>
        <button onclick="document.getElementById('addTierModal').classList.remove('hidden')"
                class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">+ 新增规则</button>
    </div>

    <div id="tierTable" hx-get="/api/commission/tiers/table" hx-trigger="load">
        <div class="text-center py-8 text-gray-400">加载中...</div>
    </div>

    <!-- 新增/编辑规则弹窗 -->
    <div id="addTierModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 id="tierModalTitle" class="text-lg font-semibold">新增提成规则</h3>
                <button onclick="document.getElementById('addTierModal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
            </div>
            <form id="tierForm">
                <input id="editTierId" type="hidden" value="">
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">类型</label>
                        <select id="tierType" class="w-full px-3 py-2 border rounded-lg text-sm">
                            <option value="售课提成">售课提成</option>
                            <option value="上课提成">上课提成</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">下限金额 (¥)</label>
                            <input id="tierMin" type="number" step="0.01" value="0" class="w-full px-3 py-2 border rounded-lg text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">上限金额 (¥)</label>
                            <input id="tierMax" type="number" step="0.01" value="0" class="w-full px-3 py-2 border rounded-lg text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">提成比例 (%)</label>
                        <input id="tierRate" type="number" step="0.1" value="0" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                    <p class="text-xs text-gray-400">留空或填 0 表示无上限</p>
                </div>
                <div class="flex justify-end gap-2 mt-4">
                    <button type="button" onclick="document.getElementById('addTierModal').classList.add('hidden')" class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">取消</button>
                    <button type="submit" class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ──────── 佣金计算 ──────── -->
<div id="calcSection" class="hidden">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-4">
        <div class="flex items-end gap-3">
            <div>
                <label class="block text-xs text-gray-500 mb-1">选择员工</label>
                <select id="calcStaff" class="px-3 py-2 border rounded-lg text-sm w-48">
                    <option value="">请选择</option>
                </select>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">年份</label>
                <input id="calcYear" type="number" value="" class="px-3 py-2 border rounded-lg text-sm w-24">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">月份</label>
                <select id="calcMonth" class="px-3 py-2 border rounded-lg text-sm w-24">
                    <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
                    <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
                    <option value="7">7月</option><option value="8">8月</option>
                    <option value="9">9月</option><option value="10">10月</option><option value="11">11月</option>
                    <option value="12">12月</option>
                </select>
            </div>
            <button onclick="calculateCommission()" class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700 text-sm">📊 计算</button>
        </div>
    </div>

    <div id="calcResult" class="hidden">
        <!-- 结果卡片 -->
    </div>
</div>

{% block page_js %}
<script src="/static/js/commission.js"></script>
{% endblock %}
{% endblock %}
