{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-semibold text-gray-800">到期提醒</h2>
</div>

<div class="mb-4 flex gap-2">
    <select id="statusFilter" class="px-3 py-2 border rounded-lg text-sm"
            hx-get="/api/alerts/table" hx-trigger="change" hx-target="#alertTable" hx-params="status">
        <option value="">全部状态</option>
        <option value="未处理">未处理</option>
        <option value="处理中">处理中</option>
        <option value="已处理">已处理</option>
    </select>
    <select id="typeFilter" class="px-3 py-2 border rounded-lg text-sm"
            hx-get="/api/alerts/table" hx-trigger="change" hx-target="#alertTable" hx-params="alert_type">
        <option value="">全部类型</option>
        <option value="会籍到期">会籍到期</option>
        <option value="课程到期">课程到期</option>
        <option value="充值提醒">充值提醒</option>
        <option value="生日提醒">生日提醒</option>
    </select>
</div>

<div id="alertTable" hx-get="/api/alerts/table" hx-trigger="load">
    <div class="text-center py-8 text-gray-400">加载中...</div>
</div>
{% endblock %}
